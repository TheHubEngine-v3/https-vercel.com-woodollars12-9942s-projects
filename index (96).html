          <div style={{width:76,height:76,borderRadius:22,background:"linear-gradient(135deg,#f0a500,#c06000)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",fontSize:30,animation:"glow 3s infinite"}}>⚡</div>
          <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:30,fontWeight:900,color:"#fff",letterSpacing:-1.5}}>HUB ENGINE</div>
          <div style={{fontSize:10,color:"#f0a500",fontWeight:700,letterSpacing:5,marginTop:4}}>V 4 . 0</div>
        </div>
        <div style={{background:"rgba(255,255,255,0.04)",border:`1px solid ${err?"#ef4444":"#1e2433"}`,borderRadius:20,padding:32,backdropFilter:"blur(20px)",transition:"border-color .25s",animation:shake?"shake .4s":"none"}}>

            <button onClick={()=>setShow(!show)} style={{position:"absolute",right:13,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#8891a8",cursor:"pointer",fontSize:17}}>{show?"🙈":"👁️"}</button>

}

// ── AI TOOLS ──────────────────────────────────────────────────
function AITools({onSaveScript}){
  const [sel,setSel]=useState(null),[input,setInput]=useState(""),[output,setOutput]=useState(""),[loading,setLoading]=useState(false),[copied,setCopied]=useState(false),[saved,setSaved]=useState(false),[cat,setCat]=useState("All");
  const cats=["All",...[...new Set(TOOLS.map(t=>t.cat))]];
  const filtered=cat==="All"?TOOLS:TOOLS.filter(t=>t.cat===cat);
  async function run(){
    if(!input.trim()||!sel)return;
    setLoading(true);setOutput("");
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sel.sys,messages:[{role:"user",content:input}]})});
      const d=await r.json();
      setOutput(d.content?.map(b=>b.text||"").join("")||"⚠️ No response.");
    }catch{setOutput("⚠️ Connection error.");}
    setLoading(false);
  }
  function saveToArchive(){
    if(!output||!sel)return;
    onSaveScript({id:uid(),tool:sel.name,toolEmoji:sel.emoji,toolColor:sel.color,input,output,date:today(),title:input.slice(0,60)+(input.length>60?"...":"")});
    setSaved(true);setTimeout(()=>setSaved(false),2500);
  }
  return(
    <div style={{animation:"slideIn .35s ease"}}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:18,flexWrap:"wrap",gap:10}}>
        <div>

          <div style={{fontSize:12,color:"#8891a8",marginTop:2}}>12 Claude-powered tools · outputs save to Script Archive.</div>
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{cats.map(c=><button key={c} onClick={()=>setCat(c)} style={{fontSize:11,fontWeight:700,padding:"5px 11px",borderRadius:7,border:`1px solid ${cat===c?"#f0a500":"#1e2433"}`,background:cat===c?"rgba(240,165,0,.11)":"transparent",color:cat===c?"#f0a500":"#8891a8",cursor:"pointer"}}>{c}</button>)}</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:18}}>
        {filtered.map(t=>(
          <button key={t.id} onClick={()=>{setSel(t);setInput("");setOutput("");setSaved(false);}} style={{background:sel?.id===t.id?`${t.color}13`:"rgba(255,255,255,0.03)",border:`1px solid ${sel?.id===t.id?t.color:"#1e2433"}`,borderRadius:13,padding:14,textAlign:"left",cursor:"pointer",transition:"all .16s"}} onMouseEnter={e=>{if(sel?.id!==t.id){e.currentTarget.style.borderColor=`${t.color}44`;e.currentTarget.style.background="rgba(255,255,255,0.045)";}}} onMouseLeave={e=>{if(sel?.id!==t.id){e.currentTarget.style.borderColor="#1e2433";e.currentTarget.style.background="rgba(255,255,255,0.03)";}}}> 
            <div style={{display:"flex",gap:9,alignItems:"flex-start"}}>
              <span style={{fontSize:20,lineHeight:1}}>{t.emoji}</span>
              <div><div style={{fontSize:12,fontWeight:600,color:"#e8eaf0",lineHeight:1.3}}>{t.name}</div><div style={{fontSize:10,color:"#5a6275",marginTop:2}}>{t.desc}</div></div>
            </div>
            <div style={{marginTop:9,...C.tag(t.color),display:"inline-block"}}>{t.cat}</div>
          </button>
        ))}
      </div>
      {sel?(

  const yr=curDate.getFullYear(),mo=curDate.getMonth();
  const firstDay=new Date(yr,mo,1).getDay(),daysInMo=new Date(yr,mo+1,0).getDate();
  const moName=curDate.toLocaleString("default",{month:"long"});

  function evOn(d){const ds=`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;return events.filter(e=>e.date===ds);}
  function getWeek(){const d=new Date(curDate);d.setDate(d.getDate()-d.getDay());return Array.from({length:7},(_,i)=>{const x=new Date(d);x.setDate(d.getDate()+i);return x;});}
  const weekDays=getWeek();
  const upcoming=[...events].filter(e=>e.date>=today()).sort((a,b)=>a.date.localeCompare(b.date));
  const prev=()=>{const d=new Date(curDate);mode==="month"?d.setMonth(d.getMonth()-1):d.setDate(d.getDate()-7);setCurDate(d);};

  return(
    <div style={{animation:"slideIn .35s ease"}}>

        </div>
        <div style={{display:"flex",gap:8}}>
          <div style={{display:"flex",gap:4}}>
            {["month","week","list"].map(m=><button key={m} onClick={()=>setMode(m)} style={{fontSize:11,fontWeight:700,padding:"7px 13px",borderRadius:8,border:`1px solid ${mode===m?"#f0a500":"#1e2433"}`,background:mode===m?"rgba(240,165,0,.11)":"transparent",color:mode===m?"#f0a500":"#8891a8",cursor:"pointer",textTransform:"capitalize"}}>{m}</button>)}
          </div>
          <button onClick={()=>openNew()} style={C.gold}>＋ Add Event</button>
        </div>
      </div>

      {mode!=="list"&&(
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
          <button onClick={prev} style={{...C.ghost,padding:"7px 14px"}}>‹</button>
          <div style={{flex:1,textAlign:"center",fontFamily:"'Space Grotesk',sans-serif",fontSize:17,fontWeight:800,color:"#fff"}}>
            {mode==="month"?`${moName} ${yr}`:`Week of ${weekDays[0].toLocaleDateString("en-US",{month:"short",day:"numeric"})} – ${weekDays[6].toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}`}
          </div>
          <button onClick={()=>setCurDate(new Date())} style={{...C.ghost,padding:"7px 12px",fontSize:11}}>Today</button>
          <button onClick={next} style={{...C.ghost,padding:"7px 14px"}}>›</button>
        </div>
      )}

      {/* MONTH */}
      {mode==="month"&&(
        <div style={{...C.card,padding:0,overflow:"hidden"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",borderBottom:"1px solid #1a1f2e"}}>
            {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=><div key={d} style={{padding:"9px 0",textAlign:"center",fontSize:10,fontWeight:700,color:"#5a6275",letterSpacing:1}}>{d}</div>)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
            {Array.from({length:firstDay},(_,i)=><div key={"e"+i} style={{minHeight:86,borderRight:"1px solid #0e1117",borderBottom:"1px solid #0e1117",background:"#07080e"}}/>)}
            {Array.from({length:daysInMo},(_,i)=>{
              const d=i+1,ds=`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`,isToday=ds===today(),dayEvts=evOn(d);
              return(
                <div key={d} onClick={()=>openNew(ds)} style={{minHeight:86,borderRight:"1px solid #0e1117",borderBottom:"1px solid #0e1117",padding:6,cursor:"pointer",transition:"background .12s"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,.022)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <div style={{fontSize:11,fontWeight:isToday?800:500,color:isToday?"#000":"#8891a8",background:isToday?"#f0a500":"transparent",width:20,height:20,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:3}}>{d}</div>
                  {dayEvts.slice(0,3).map(ev=><div key={ev.id} onClick={e=>{e.stopPropagation();openEdit(ev);}} style={{fontSize:9,fontWeight:700,padding:"2px 5px",borderRadius:4,background:`${ev.color}1e`,color:ev.color,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",border:`1px solid ${ev.color}28`}}>{ev.emoji} {ev.title}</div>)}
                  {dayEvts.length>3&&<div style={{fontSize:9,color:"#4a5166"}}>+{dayEvts.length-3}</div>}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* WEEK */}
      {mode==="week"&&(
        <div style={{...C.card,padding:0,overflow:"hidden"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",borderBottom:"1px solid #1a1f2e"}}>
            {weekDays.map(d=>{const ds=d.toISOString().slice(0,10),isT=ds===today();return(
              <div key={ds} style={{padding:"9px 7px",textAlign:"center",background:isT?"rgba(240,165,0,.07)":"transparent",borderRight:"1px solid #0e1117"}}>
                <div style={{fontSize:10,fontWeight:700,color:"#5a6275",letterSpacing:1}}>{d.toLocaleString("default",{weekday:"short"}).toUpperCase()}</div>
                <div style={{fontSize:18,fontWeight:900,color:isT?"#f0a500":"#e8eaf0",marginTop:2}}>{d.getDate()}</div>
              </div>
            );})}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",minHeight:200}}>
            {weekDays.map(d=>{const ds=d.toISOString().slice(0,10),dayEvts=events.filter(e=>e.date===ds);return(
              <div key={ds} onClick={()=>openNew(ds)} style={{padding:7,borderRight:"1px solid #0e1117",cursor:"pointer",minHeight:160,transition:"background .12s"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,.022)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                {dayEvts.map(ev=><div key={ev.id} onClick={e=>{e.stopPropagation();openEdit(ev);}} style={{fontSize:10,fontWeight:600,padding:"5px 7px",borderRadius:6,background:`${ev.color}16`,color:ev.color,marginBottom:5,border:`1px solid ${ev.color}28`,lineHeight:1.4}}>
                  <div>{ev.emoji} {ev.title}</div>
                  {ev.host&&<div style={{fontSize:9,opacity:.65,marginTop:1}}>{ev.host}</div>}
                </div>)}
              </div>
            );})}
          </div>
        </div>
      )}

      {/* LIST */}
      {mode==="list"&&(
        <div>
          {[["This Week",0,7],["Next Week",7,14],["This Month",14,60],["Later",60,3650]].map(([label,from,to])=>{
            const base=new Date(today());
            const s=new Date(base);s.setDate(s.getDate()+from);
            const e2=new Date(base);e2.setDate(e2.getDate()+to);
            const grp=events.filter(e=>new Date(e.date)>=s&&new Date(e.date)<e2).sort((a,b)=>a.date.localeCompare(b.date));
            if(!grp.length)return null;
            return(
              <div key={label} style={{marginBottom:22}}>
                <div style={{fontSize:10,color:"#8891a8",fontWeight:700,letterSpacing:2,marginBottom:10}}>{label.toUpperCase()} ({grp.length})</div>
                {grp.map(ev=>(
                  <div key={ev.id} style={{...C.card,display:"flex",alignItems:"center",gap:13,marginBottom:9,padding:16,borderLeft:`3px solid ${ev.color}`}}>
                    <div style={{width:40,height:40,borderRadius:11,background:`${ev.color}16`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{ev.emoji}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600,color:"#e8eaf0"}}>{ev.title}</div>
                      <div style={{fontSize:11,color:"#6b7485",marginTop:1}}>{fmtDate(ev.date)} · {ev.host} · {ev.platform} · <span style={{color:ev.color}}>{ev.type}</span></div>
                      {ev.notes&&<div style={{fontSize:11,color:"#4a5166",marginTop:1}}>{ev.notes}</div>}
                    </div>
                    <div style={{display:"flex",gap:7,flexShrink:0}}>
                      <button onClick={()=>openEdit(ev)} style={{background:"rgba(167,139,250,.1)",border:"1px solid rgba(167,139,250,.28)",color:"#a78bfa",borderRadius:7,padding:"5px 11px",fontSize:11,fontWeight:700,cursor:"pointer"}}>✏️ Edit</button>
                      <button onClick={()=>del(ev.id)} style={C.danger}>🗑️</button>
                    </div>
                  </div>
                ))}
              </div>
            );
          })}
          {events.length===0&&<div style={{...C.card,textAlign:"center",padding:50,border:"1px dashed #1a1f2e"}}><div style={{fontSize:36,marginBottom:10}}>📅</div><div style={{fontSize:14,fontWeight:600,color:"#6b7485"}}>No events yet</div><div style={{fontSize:12,color:"#3a4156",marginTop:5}}>Click <strong style={{color:"#f0a500"}}>+ Add Event</strong> to schedule content</div></div>}
        </div>
      )}

      {showForm&&(
        <div className="mbg" onClick={e=>e.target===e.currentTarget&&setShowForm(false)}>
          <div className="modal">
            <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:17,fontWeight:800,color:"#fff",marginBottom:18}}>{editEvt?"✏️ Edit Event":"📅 Add New Event"}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:13}}>
              <div style={{gridColumn:"1/-1"}}><label style={C.lbl}>TITLE *</label><input value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))} placeholder="e.g. Lisa — AI Weekly Roundup Ep. 48" style={{...C.inp,border:"1px solid #1e2433"}}/></div>
              <div><label style={C.lbl}>EVENT TYPE</label><select value={form.type} onChange={e=>setForm(p=>({...p,type:e.target.value}))} style={{...C.sel,border:"1px solid #1e2433"}}>{EVENT_TYPES.map(t=><option key={t.type}>{t.type}</option>)}</select></div>
              <div><label style={C.lbl}>DATE</label><input type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} style={{...C.inp,border:"1px solid #1e2433",colorScheme:"dark"}}/></div>
              <div><label style={C.lbl}>HOST</label><select value={form.host} onChange={e=>setForm(p=>({...p,host:e.target.value}))} style={{...C.sel,border:"1px solid #1e2433"}}>
                {["All",...HOSTS_LIST].map(h=><option key={h}>{h}</option>)}
              </select></div>
              <div><label style={C.lbl}>PLATFORM</label><select value={form.platform} onChange={e=>setForm(p=>({...p,platform:e.target.value}))} style={{...C.sel,border:"1px solid #1e2433"}}>{PLATFORMS.map(p=><option key={p}>{p}</option>)}</select></div>
              <div style={{gridColumn:"1/-1"}}><label style={C.lbl}>NOTES</label><textarea value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))} placeholder="Notes for this event..." style={{...C.inp,height:68,resize:"vertical",border:"1px solid #1e2433"}}/></div>
            </div>
            <div style={{display:"flex",gap:7,flexWrap:"wrap",marginTop:11}}>
              {EVENT_TYPES.map(t=><div key={t.type} onClick={()=>setForm(p=>({...p,type:t.type}))} style={{fontSize:10,fontWeight:700,padding:"5px 11px",borderRadius:7,background:form.type===t.type?`${t.color}1e`:"rgba(255,255,255,.03)",border:`1px solid ${form.type===t.type?t.color:"#1e2433"}`,color:form.type===t.type?t.color:"#8891a8",cursor:"pointer"}}>{t.emoji} {t.type}</div>)}
            </div>
            <div style={{display:"flex",gap:9,marginTop:20}}>
              <button onClick={save} style={{...C.gold,flex:1,justifyContent:"center"}}>✅ {editEvt?"Save Changes":"Add to Calendar"}</button>
              {editEvt&&<button onClick={()=>{del(editEvt);setShowForm(false);}} style={{...C.danger,padding:"10px 14px"}}>🗑️</button>}
              <button onClick={()=>setShowForm(false)} style={{...C.ghost,flex:1,justifyContent:"center"}}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────
function App(){
  const [authed,setAuthed]=useState(false),[tab,setTab]=useState("dashboard");
  const [videos,setVidRaw]=useState(()=>store.get("videos",[]));
  const [scripts,setScrRaw]=useState(()=>store.get("scripts",[]));
  const [events,setEvtRaw]=useState(()=>store.get("events",[]));

  const setVideos=fn=>{setVidRaw(p=>{const n=typeof fn==="function"?fn(p):fn;store.set("videos",n);return n;});};
  const setScripts=fn=>{setScrRaw(p=>{const n=typeof fn==="function"?fn(p):fn;store.set("scripts",n);return n;});};
  const setEvents=fn=>{setEvtRaw(p=>{const n=typeof fn==="function"?fn(p):fn;store.set("events",n);return n;});};
  const saveScript=s=>setScripts(p=>[...p,s]);

  const nav=[
    {id:"dashboard", label:"Dashboard",    icon:"📊"},
    {id:"tools",     label:"AI Tools",     icon:"⚡"},
    {id:"library",   label:"Video Library",icon:"🎬",badge:()=>videos.length},
    {id:"archive",   label:"Scripts",      icon:"📄",badge:()=>scripts.length},
    {id:"calendar",  label:"Calendar",     icon:"📅",badge:()=>events.length},
    {id:"studio",    label:"News Studio",  icon:"📺"},
    {id:"affiliates",label:"Affiliates",   icon:"💰"},
    {id:"team",      label:"Team HQ",      icon:"👥"},
  ];

  if(!authed)return <Gate onAuth={()=>setAuthed(true)}/>;

  return(
    <div style={{minHeight:"100vh",background:"#06070d",display:"flex"}}>
      <aside style={{width:205,background:"#080b12",borderRight:"1px solid #141820",display:"flex",flexDirection:"column",position:"fixed",top:0,left:0,height:"100vh",zIndex:100}}>
        <div style={{padding:"18px 14px 14px",borderBottom:"1px solid #141820",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            <div style={{width:36,height:36,borderRadius:10,background:"linear-gradient(135deg,#f0a500,#c06000)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,animation:"glow 3s infinite",flexShrink:0}}>⚡</div>
            <div><div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:13,fontWeight:900,color:"#fff",letterSpacing:-.4}}>HUB ENGINE</div><div style={{fontSize:8,color:"#f0a500",fontWeight:700,letterSpacing:4}}>V 4 . 0</div></div>
          </div>
        </div>
        <nav style={{flex:1,padding:"11px 7px",overflowY:"auto"}}>
          {nav.map(n=>{
            const on=tab===n.id,bc=n.badge?n.badge():0;
            return(
              <button key={n.id} onClick={()=>setTab(n.id)} style={{display:"flex",alignItems:"center",gap:9,width:"100%",padding:"8px 10px",borderRadius:8,marginBottom:2,border:"none",background:on?"rgba(240,165,0,.1)":"transparent",color:on?"#f0a500":"#8891a8",cursor:"pointer",fontSize:12,fontWeight:on?600:400,transition:"all .15s",textAlign:"left"}} onMouseEnter={e=>{if(!on){e.currentTarget.style.background="rgba(255,255,255,.044)";e.currentTarget.style.color="#c8d0e0";}}} onMouseLeave={e=>{if(!on){e.currentTarget.style.background="transparent";e.currentTarget.style.color="#8891a8";}}}>
                <span style={{fontSize:14}}>{n.icon}</span>
                <span style={{flex:1}}>{n.label}</span>
                {bc>0&&<span style={{fontSize:9,fontWeight:700,background:"rgba(240,165,0,.18)",color:"#f0a500",borderRadius:9,padding:"1px 6px",minWidth:18,textAlign:"center"}}>{bc}</span>}
                {on&&<span style={{width:5,height:5,borderRadius:"50%",background:"#f0a500",flexShrink:0}}/>}
              </button>
            );
          })}
        </nav>
        <div style={{padding:"10px 7px",borderTop:"1px solid #141820",flexShrink:0}}>
          <div style={{fontSize:8,color:"#242c3a",textAlign:"center",lineHeight:1.7,marginBottom:7}}>Three Minds · One Mission<br/>Zero Cost · Orange, TX</div>
          <button onClick={()=>setAuthed(false)} style={{...C.ghost,width:"100%",justifyContent:"center",fontSize:11,padding:"7px",borderRadius:7}}>🔒 Lock Hub</button>
        </div>
      </aside>

      <main style={{marginLeft:205,flex:1,padding:"28px 32px",minHeight:"100vh"}}>
        <div style={{maxWidth:1000}}>
          {tab==="dashboard"  &&<Dashboard setTab={setTab} videos={videos} scripts={scripts} events={events}/>}
          {tab==="tools"      &&<AITools onSaveScript={saveScript}/>}
          {tab==="library"    &&<VideoLibrary videos={videos} setVideos={setVideos}/>}
          {tab==="archive"    &&<ScriptArchive scripts={scripts} setScripts={setScripts}/>}
          {tab==="calendar"   &&<ContentCalendar events={events} setEvents={setEvents}/>}
          {tab==="studio"     &&<Studio/>}
          {tab==="affiliates" &&<Affiliates/>}
          {tab==="team"       &&<Team/>}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
