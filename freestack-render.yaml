services:
  - type: web
    name: freestack-video
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 10000
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        value: freestack-video
      - key: R2_PUBLIC_BASE
        sync: false
    healthCheckPath: /healthz
