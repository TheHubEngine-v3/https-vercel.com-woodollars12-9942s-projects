<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" width="800" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a0e1a"/>
      <stop offset="50%"  stop-color="#0d1520"/>
      <stop offset="100%" stop-color="#0a1a14"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#00b894"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f5c518"/>
      <stop offset="100%" stop-color="#d4a40a"/>
    </linearGradient>
    <linearGradient id="cardgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="rgba(167,139,250,0.12)"/>
      <stop offset="100%" stop-color="rgba(0,212,170,0.06)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg)"/>

  <!-- Subtle radial glows -->
  <circle cx="400" cy="300" r="350" fill="#00d4aa" opacity="0.03"/>
  <circle cx="600" cy="100" r="180" fill="#a78bfa" opacity="0.06"/>
  <circle cx="150" cy="650" r="200" fill="#f5c518" opacity="0.03"/>

  <!-- Grid lines -->
  <g opacity="0.05" stroke="#00d4aa" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="0" y1="600" x2="800" y2="600"/>
    <line x1="0" y1="700" x2="800" y2="700"/>
    <line x1="100" y1="0" x2="100" y2="800"/>
    <line x1="200" y1="0" x2="200" y2="800"/>
    <line x1="300" y1="0" x2="300" y2="800"/>
    <line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="500" y1="0" x2="500" y2="800"/>
    <line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="700" y1="0" x2="700" y2="800"/>
  </g>

  <!-- Border frame -->
  <rect x="24" y="24" width="752" height="752" rx="20" fill="none" stroke="rgba(0,212,170,0.2)" stroke-width="1.5"/>
  <rect x="30" y="30" width="740" height="740" rx="16" fill="none" stroke="rgba(167,139,250,0.1)" stroke-width="1"/>

  <!-- Top accent bar -->
  <rect x="24" y="24" width="752" height="5" rx="3" fill="url(#teal)"/>

  <!-- ── CENTER LOGO AREA ── -->
  <!-- Hub icon circle -->
  <circle cx="400" cy="190" r="80" fill="rgba(0,212,170,0.08)" stroke="rgba(0,212,170,0.4)" stroke-width="2"/>
  <circle cx="400" cy="190" r="62" fill="rgba(0,212,170,0.06)" stroke="rgba(0,212,170,0.2)" stroke-width="1"/>
  <!-- HE text in circle -->
  <text x="400" y="178" font-family="Georgia, serif" font-size="42" font-weight="900" fill="#00d4aa" text-anchor="middle" filter="url(#glow)">HE</text>
  <text x="400" y="218" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="rgba(0,212,170,0.7)" text-anchor="middle" letter-spacing="3">v4</text>

  <!-- ── MAIN TITLE ── -->
  <text x="400" y="316" font-family="Georgia, serif" font-size="52" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-1">Hub Engine</text>
  <!-- Teal underline -->
  <rect x="240" y="326" width="320" height="3" rx="2" fill="url(#teal)"/>

  <!-- Studio name -->
  <text x="400" y="365" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#00d4aa" text-anchor="middle" letter-spacing="4">AFFILIATEMEDIAHUB STUDIO</text>
  <text x="400" y="392" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="middle">AI Content Production · Orange, Texas</text>

  <!-- ── FEATURE BADGES ── -->
  <!-- Row of 3 badges -->
  <!-- Badge 1 -->
  <rect x="100" y="418" width="170" height="36" rx="18" fill="rgba(0,212,170,0.12)" stroke="#00d4aa" stroke-width="1.2"/>
  <text x="185" y="441" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#00d4aa" text-anchor="middle">⚡ Groq AI Powered</text>
  <!-- Badge 2 -->
  <rect x="315" y="418" width="170" height="36" rx="18" fill="rgba(167,139,250,0.12)" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="400" y="441" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#a78bfa" text-anchor="middle">🎙 ElevenLabs Voice</text>
  <!-- Badge 3 -->
  <rect x="530" y="418" width="170" height="36" rx="18" fill="rgba(245,197,24,0.12)" stroke="#f5c518" stroke-width="1.2"/>
  <text x="615" y="441" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#f5c518" text-anchor="middle">🎬 FreeStack Video</text>

  <!-- ── TOOL GRID — 6 cards ── -->
  <!-- Row 1 -->
  <!-- Auto-Publish -->
  <rect x="70" y="480" width="200" height="90" rx="12" fill="url(#cardgrad)" stroke="rgba(255,77,109,0.4)" stroke-width="1.5"/>
  <text x="90" y="516" font-family="Arial,sans-serif" font-size="22">🚀</text>
  <text x="122" y="513" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="white">Auto-Publish</text>
  <text x="122" y="532" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">1-tap video posting</text>
  <text x="90" y="554" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,77,109,0.8)">YouTube · TikTok · Instagram</text>

  <!-- Video Studio -->
  <rect x="300" y="480" width="200" height="90" rx="12" fill="url(#cardgrad)" stroke="rgba(167,139,250,0.4)" stroke-width="1.5"/>
  <text x="320" y="516" font-family="Arial,sans-serif" font-size="22">🎬</text>
  <text x="352" y="513" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="white">Video Studio</text>
  <text x="352" y="532" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Build 1–5 min videos</text>
  <text x="320" y="554" font-family="Arial,sans-serif" font-size="10" fill="rgba(167,139,250,0.8)">Templates · Scenes · Render</text>

  <!-- Becky AI -->
  <rect x="530" y="480" width="200" height="90" rx="12" fill="url(#cardgrad)" stroke="rgba(0,212,170,0.4)" stroke-width="1.5"/>
  <text x="550" y="516" font-family="Arial,sans-serif" font-size="22">🤖</text>
  <text x="582" y="513" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="white">Becky AI</text>
  <text x="582" y="532" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Creative Director</text>
  <text x="550" y="554" font-family="Arial,sans-serif" font-size="10" fill="rgba(0,212,170,0.8)">6 Engines · Gmail · Scripts</text>

  <!-- Row 2 -->
  <!-- Avatar Creator -->
  <rect x="70" y="590" width="200" height="80" rx="12" fill="url(#cardgrad)" stroke="rgba(245,197,24,0.3)" stroke-width="1.5"/>
  <text x="90" y="622" font-family="Arial,sans-serif" font-size="20">🎭</text>
  <text x="120" y="620" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="white">Avatar Creator</text>
  <text x="120" y="637" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Lisa · Susan · Paul · Alisha</text>
  <text x="90" y="658" font-family="Arial,sans-serif" font-size="10" fill="rgba(245,197,24,0.8)">30 sec – 5 min videos</text>

  <!-- Job Finder -->
  <rect x="300" y="590" width="200" height="80" rx="12" fill="url(#cardgrad)" stroke="rgba(245,197,24,0.3)" stroke-width="1.5"/>
  <text x="320" y="622" font-family="Arial,sans-serif" font-size="20">🔍</text>
  <text x="350" y="620" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="white">AI Job Finder</text>
  <text x="350" y="637" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Resume · Cover Letter</text>
  <text x="320" y="658" font-family="Arial,sans-serif" font-size="10" fill="rgba(245,197,24,0.8)">SE Texas Operations Roles</text>

  <!-- FreeStack Video -->
  <rect x="530" y="590" width="200" height="80" rx="12" fill="url(#cardgrad)" stroke="rgba(52,211,153,0.3)" stroke-width="1.5"/>
  <text x="550" y="622" font-family="Arial,sans-serif" font-size="20">⚙️</text>
  <text x="582" y="620" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="white">FreeStack Video</text>
  <text x="582" y="637" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">Own render server</text>
  <text x="550" y="658" font-family="Arial,sans-serif" font-size="10" fill="rgba(52,211,153,0.8)">FFmpeg · $0 · No watermarks</text>

  <!-- ── BOTTOM TAGLINE ── -->
  <text x="400" y="718" font-family="Georgia, serif" font-size="17" fill="rgba(255,255,255,0.35)" text-anchor="middle" font-style="italic">Three Minds. One Mission. Zero Cost.</text>

  <!-- Bottom cost pills -->
  <rect x="240" y="733" width="100" height="24" rx="12" fill="rgba(0,212,170,0.1)" stroke="rgba(0,212,170,0.3)" stroke-width="1"/>
  <text x="290" y="749" font-family="Arial,sans-serif" font-size="11" fill="#00d4aa" text-anchor="middle" font-weight="700">$5/month</text>
  <rect x="352" y="733" width="96" height="24" rx="12" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
  <text x="400" y="749" font-family="Arial,sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="700">90 AI Tools</text>
  <rect x="460" y="733" width="100" height="24" rx="12" fill="rgba(245,197,24,0.1)" stroke="rgba(245,197,24,0.3)" stroke-width="1"/>
  <text x="510" y="749" font-family="Arial,sans-serif" font-size="11" fill="#f5c518" text-anchor="middle" font-weight="700">100% Owned</text>

  <!-- Bottom accent bar -->
  <rect x="24" y="771" width="752" height="5" rx="3" fill="url(#purple)"/>
</svg>
