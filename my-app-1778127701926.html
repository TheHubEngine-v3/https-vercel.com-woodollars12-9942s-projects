<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuideHub Previews</title>
    <style>
        body {
            background-color: #0c0f1a;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .template {
            background-color: #1a1d23;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        .template img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px 10px 0 0;
        }
        .template iframe {
            width: 100%;
            height: 300px;
            border: none;
            border-radius: 0 0 10px 10px;
        }
        .button {
            background-color: #00d4aa;
            color: #000;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #00c9a5;
        }
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #0c0f1a;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>GuideHub Previews</h1>
    <div class="templates">
        <div class="template">
            <img src="template1.jpg" alt="Template 1">
            <h2>Template 1</h2>
            <button class="button" onclick="openDemo('template1.html')">Live Demo</button>
            <button class="button" onclick="downloadSample('template1.zip')">Sample ZIP</button>
            <iframe id="template1" src="" frameborder="0"></iframe>
        </div>
        <div class="template">
            <img src="template2.jpg" alt="Template 2">
            <h2>Template 2</h2>
            <button class="button" onclick="openDemo('template2.html')">Live Demo</button>
            <button class="button" onclick="downloadSample('template2.zip')">Sample ZIP</button>
            <iframe id="template2" src="" frameborder="0"></iframe>
        </div>
        <div class="template">
            <img src="template3.jpg" alt="Template 3">
            <h2>Template 3</h2>
            <button class="button" onclick="openDemo('template3.html')">Live Demo</button>
            <button class="button" onclick="downloadSample('template3.zip')">Sample ZIP</button>
            <iframe id="template3" src="" frameborder="0"></iframe>
        </div>
    </div>
    <script>
        function openDemo(url) {
            const iframe = document.querySelector(`iframe#${url.split('.')[0]}`);
            iframe.src = url;
        }
        function downloadSample(url) {
            const a = document.createElement('a');
            a.href = url;
            a.download = url;
            a.click();
        }
        // LocalStorage data persistence
        if (localStorage.getItem('templates')) {
            const templates = JSON.parse(localStorage.getItem('templates'));
            templates.forEach(template => {
                const div = document.createElement('div');
                div.classList.add('template');
                div.innerHTML = `
                    <img src="${template.image}" alt="${template.name}">
                    <h2>${template.name}</h2>
                    <button class="button" onclick="openDemo('${template.demo}')">Live Demo</button>
                    <button class="button" onclick="downloadSample('${template.sample}')">Sample ZIP</button>
                    <iframe id="${template.name}" src="" frameborder="0"></iframe>
                `;
                document.querySelector('.templates').appendChild(div);
            });
        }
    </script>
    <footer>
        Powered by <a href="#" style="color: #00d4aa;">AffiliateMediaHub Studio</a>
    </footer>
</body>
</html>
