{id:"video",emoji:"🎬",title:"How To Make Videos",color:"#f0a500",lessons:[
{title:"What Is AI Video Generation?",body:"AI video generation means using software to create videos automatically from text. Tools like InVideo AI and Vidnoz let you TYPE a script and the AI creates a complete video with visuals, music, and voiceover. You do NOT need a camera, actors, or editing skills.\n\nTHINK OF IT LIKE THIS:\nYou type: Create a 45-second video about how AI is changing customer service\nThe AI does: picks visuals, adds music, generates voiceover, assembles the video\nYou get: a complete professional video in minutes\n\nTHE TWO TOOLS YOU WILL USE:\n1. InVideo AI - best for news-style and social content (30% commission)\n2. Vidnoz - best for avatar-based videos with your anchors (50% commission)"},
{title:"Making Your First Video with InVideo AI",body:"STEP BY STEP - YOUR FIRST VIDEO:\n\n1. Go to invideo.io and sign in\n2. Click AI Video Generator\n3. Type your topic - example: AI robots replacing warehouse workers, 45 seconds, news style\n4. Select video style: News/Corporate\n5. Select aspect ratio: 16:9 for YouTube, 9:16 for TikTok\n6. Hit Generate - wait 2-3 minutes\n7. Review the video - edit text or swap clips you do not like\n8. Export and download\n\nPRO TIP: The more specific your description, the better the result.\nBad: Make a video about AI\nGood: Make a 45-second breaking news video about AI replacing customer service jobs, urgent tone, include statistics"},
{title:"Making Avatar Videos with Vidnoz",body:"Vidnoz lets you create videos where a real-looking person (avatar) speaks your script on camera. Perfect for your news anchors.\n\nSTEP BY STEP:\n1. Go to vidnoz.com and sign in\n2. Click Create Video\n3. Choose an avatar matching your anchor style\n4. Type or paste your script\n5. Select a voice (use ElevenLabs IDs for your anchors)\n6. Set background\n7. Generate and download\n\nBEST PRACTICE: Write your script in Hub Engine V4 using Anchor Intro Script tool first - then paste into Vidnoz. That is your complete workflow."},
{title:"The 45-Second Business Promo Workflow",body:"YOUR MONEY-MAKING FORMULA FOR LOCAL BUSINESSES:\n\n1. Meet the business owner - get their key message\n2. Open Hub Engine V4 - AI Tools - Video Script Writer\n3. Type: Write a 45-second promo for [BUSINESS NAME], a [TYPE] business in Orange Texas. Key message: [WHAT THEY TOLD YOU]. Tone: professional and warm.\n4. Copy the script\n5. Open Vidnoz - pick a professional avatar\n6. Paste the script - generate\n7. Download and send to client\n8. Post to their social media\n\nWHAT TO CHARGE: $150-300 per video. Weekly package: $400-600/month."},
{title:"Your Video Production Checklist",body:"Before publishing ANY video run through this:\n\nSCRIPT:\n[ ] Strong hook in first 3 seconds?\n[ ] Message clear and focused on ONE topic?\n[ ] Ends with a clear call to action?\n[ ] Right length for the platform?\n\nVIDEO:\n[ ] Visuals relevant to the topic?\n[ ] Audio clear?\n[ ] Captions added?\n[ ] Looks good on mobile?\n\nPOSTING:\n[ ] Platform-specific caption written?\n[ ] 3-tier hashtags added?\n[ ] Affiliate link in description?\n[ ] Added to Content Calendar?\n\nIF ALL CHECKED - hit publish!"}
]},
{id:"prompt",emoji:"⚡",title:"Prompt Engineering 101",color:"#a78bfa",lessons:[
{title:"What Is A Prompt - Plain English",body:"A PROMPT is simply the instruction you give to an AI.\n\nThe quality of what you get back depends 100% on the quality of what you put in.\n\nBAD PROMPT: Write a script\n\nGOOD PROMPT: Write a 45-second news script for Lisa, my professional anchor, about AI replacing warehouse jobs. Tone: urgent and authoritative. Include a strong hook and end with a call to action to visit our website.\n\nThe good prompt tells the AI:\n- WHO is delivering it (Lisa)\n- WHAT it is about (AI replacing jobs)\n- HOW LONG (45 seconds)\n- WHAT TONE (urgent, authoritative)\n- WHAT STRUCTURE (hook + CTA)\n\nTHAT IS ALL PROMPT ENGINEERING IS. Being specific and clear."},
{title:"The 5-Part Prompt Formula",body:"Every great prompt has 5 parts. Remember as RTFCS:\n\n1. ROLE - Tell the AI who to be\nExample: You are a professional TV news writer\n\n2. TASK - Tell it exactly what to do\nExample: Write a 45-second anchor script\n\n3. FORMAT - Tell it how to structure the output\nExample: Divide into HOOK, BODY, CTA with time markers\n\n4. CONSTRAINTS - Give it limits and rules\nExample: Under 100 words. No jargon. Must mention the website.\n\n5. STYLE - Tell it the tone and voice\nExample: Tone: urgent and authoritative like CNN Breaking News\n\nPUT IT ALL TOGETHER:\nYou are a professional TV news writer. Write a 45-second anchor script about AI replacing warehouse jobs. Divide into HOOK, BODY, CTA with time markers. Under 100 words, no jargon. Tone: urgent and authoritative like CNN Breaking News.\n\nTHAT is a world-class prompt."},
{title:"10 Real Prompts You Can Use Today",body:"Copy and use these in AI Tools:\n\n1. SCRIPT: Write a 60-second video script for Lisa about [TOPIC]. Hook in first 3 seconds. Professional news anchor tone. End with call to action.\n\n2. AFFILIATE: Write 3 social captions promoting Vidnoz AI. Focus on benefit: saves 5 hours of editing per week. Include CTA. Audience: small business owners.\n\n3. EMAIL: Write a 3-email welcome sequence for someone who signed up for InVideo AI through my affiliate link. Friendly helpful tone. Each email under 200 words.\n\n4. TITLE: Write 5 YouTube titles for a video about AI replacing customer service jobs. Click-worthy but not clickbait. Audience: business owners over 40.\n\n5. FUNNEL: Write landing page copy for Vidnoz AI targeting local business owners in Southeast Texas who want weekly promo videos but have no video skills.\n\nUSE THESE AS TEMPLATES - just swap the topic or product name."},
{title:"How To Give Better Instructions",body:"THREE GOLDEN RULES for talking to AI:\n\nRULE 1 - BE SPECIFIC\nDo not say: Make it better\nDo say: Make the hook more urgent and add a statistic in the first sentence\n\nRULE 2 - GIVE EXAMPLES\nDo not say: Write it like a news anchor\nDo say: Write it like a CNN Breaking News anchor - short sentences, high urgency, facts first\n\nRULE 3 - ITERATE\nYour first result is NOT your final result. Always follow up with:\n- Make the opening line stronger\n- Shorten this to 45 seconds\n- Add more urgency to the CTA\n- Rewrite the hook - make it a shocking statistic\n\nTHINK OF IT LIKE DIRECTING AN ACTOR:\nYou would not say do it better to an actor.\nYou would say: In that last line - pause before the word BREAKING, then raise your voice slightly.\nThat is how you direct an AI."},
{title:"Explaining Your Prompts To Others",body:"When someone asks how did you build that with AI - here is what you say:\n\nI use a structured prompting technique. I start by assigning the AI a specific role - like a news writer or marketing copywriter. Then I give it a precise task with format requirements, length constraints, tone guidelines, and an example of what I am looking for. The more specific and structured the instruction, the more professional and usable the output.\n\nTHAT IS YOUR ANSWER. Confident, clear, professional.\n\nYou can also say:\nI have developed a workflow where I combine role-based prompting with iterative refinement. I generate a first draft, then give targeted feedback to improve specific elements - similar to how a director works with a creative team.\n\nJohn - when you say THAT to someone, they will know you understand AI at a working professional level. Because you DO."}
]},
{id:"affiliate",emoji:"💰",title:"Affiliate Marketing Mastery",color:"#10b981",lessons:[
{title:"What Affiliate Marketing Actually Is",body:"PLAIN ENGLISH DEFINITION:\nAffiliate marketing means you earn a commission every time someone buys a product through YOUR special link.\n\nHOW IT WORKS:\n1. You sign up as an affiliate for Vidnoz (free)\n2. They give you a unique link\n3. You share that link in your videos, descriptions, emails\n4. Someone clicks YOUR link and buys Vidnoz\n5. Vidnoz pays YOU 50% of that sale\n\nYOUR INCOME MATH:\n- Vidnoz sale worth $50 = YOU earn $25\n- 10 Vidnoz sales per month = $250\n- 20 Vidnoz sales per month = $500\n- 1 MailerLite referral = $140 - just ONE referral!\n\nYOU ALREADY HAVE 5 PROGRAMS SET UP. The only missing piece is traffic - people watching your content and clicking your links."},
{title:"Influencer-Style Affiliate Promos",body:"An influencer promo is NOT a traditional ad. It feels like a genuine recommendation from someone you trust.\n\nTHE FORMULA:\n1. HOOK - Start with a pain point or result\nI used to spend 6 hours editing one video...\n\n2. STORY - Share a relatable experience\nThen I found this AI tool that changed everything...\n\n3. DEMO - Show or describe what it does\nNow I create a complete professional video in under 10 minutes...\n\n4. PROOF - Give a specific result\nMy last video got 2,400 views in 48 hours...\n\n5. CTA - Tell them exactly what to do\nClick the link in my description to try it free\n\nKEY INSIGHT: People buy from people they trust. Your anchors Susan, Alisha, Lisa and Paul ARE your influencers."},
{title:"Your 5 Programs - Deep Dive",body:"VIDNOZ - 50% Commission - YOUR TOP EARNER\nBest audience: business owners, content creators\nBest angle: Create professional AI videos without a camera\nBest anchor: Alisha (sales energy) or Lisa (professional credibility)\n\nINVIDEO - 30% Commission\nBest audience: social media managers, YouTubers\nBest angle: 15-second affiliate ad templates that convert\nBest anchor: Alisha or Paul\n\nMAILERLITE - $140 Per Referral\nBest audience: small business owners wanting email marketing\nBest angle: Build your email list - and earn $140 per referral\nBest anchor: Susan (warm, trustworthy for small business)\n\nCAPCUT - Varies\nBest audience: TikTok and Instagram creators\nBest anchor: Lisa or Alisha\n\nUDEMY - 15% Per Course\nBest audience: people wanting to learn new skills\nBest anchor: Susan or Paul"},
{title:"Affiliate Content That Converts",body:"THE GOLDEN RULE: Always lead with VALUE not the sale.\n\nCONTENT TYPES THAT WORK:\n\n1. TUTORIAL VIDEOS - How to create a professional business video in 10 minutes\nSecretly shows InVideo or Vidnoz in action. Link in description.\n\n2. COMPARISON VIDEOS - Best AI video tools for small businesses 2025\nYou review 3 tools - your affiliate tools win.\n\n3. RESULTS VIDEOS - I made 5 videos in one day using this AI tool\nShow real results. People want proof.\n\n4. NEWS + MENTION - At end of every AI news video:\nToday's video was created using Vidnoz AI - link below\nPassive promotion. No pressure. Works while you sleep.\n\n5. EMAIL SEQUENCES - Send 3 emails over 3 days about one tool\nDay 1: The problem. Day 2: The solution. Day 3: Special offer.\n\nALL OF THESE CAN BE WRITTEN IN HUB ENGINE V4 RIGHT NOW."}
]},
{id:"funnel",emoji:"🔻",title:"Funnel Building 101",color:"#06b6d4",lessons:[
{title:"What Is A Funnel - Simple Explanation",body:"A FUNNEL is the path a stranger takes to become a paying customer.\n\nIMAGINE A REAL FUNNEL:\n- Wide at the top: Many people see your content\n- Narrower in middle: Some get interested and click\n- Narrow at bottom: A few buy\n\nTHE 4 STAGES:\n\nSTAGE 1 - AWARENESS\nThe person does not know you exist yet.\nYour job: Get their attention with a video, post, or ad.\nExample: They see your TikTok about AI replacing customer service jobs.\n\nSTAGE 2 - INTEREST\nThey watched your video and want more.\nYour job: Send them to a landing page or email opt-in.\nExample: Download my free AI tools guide - link in bio\n\nSTAGE 3 - DESIRE\nThey are on your email list now.\nYour job: Show them WHY they need your product.\nExample: Your 3-email sequence about Vidnoz.\n\nSTAGE 4 - ACTION\nThey are ready to buy.\nYour job: Make it EASY with a clear CTA and your affiliate link.\nExample: Try Vidnoz free today - link below\n\nTHAT IS THE ENTIRE FUNNEL."},
{title:"Building Your First Funnel Step by Step",body:"YOUR FIRST FUNNEL - Vidnoz Affiliate Funnel:\n\nSTEP 1 - CREATE AWARENESS\nMake a 60-second video: How I Create Professional Videos In 10 Minutes With AI\nPost to YouTube, TikTok, Instagram\nUse Lisa or Alisha to deliver it\n\nSTEP 2 - CAPTURE INTEREST\nIn video description: Get my FREE AI Video Starter Guide - link below\nSet up a free MailerLite landing page with an email opt-in form\nOffer something free in exchange for their email address\n\nSTEP 3 - BUILD DESIRE\nSend 3 emails over 3 days:\nEmail 1: Welcome + the problem (video creation takes too long)\nEmail 2: The solution (Vidnoz AI - here is what it does)\nEmail 3: Your results + special offer link\n\nSTEP 4 - DRIVE ACTION\nEmail 3 ends with: Try Vidnoz FREE for 7 days - click here\nThat link is YOUR affiliate link\nWhen they sign up - YOU earn 50% commission\n\nTOTAL COST TO BUILD THIS FUNNEL: $0"},
{title:"Funnel Copy That Gets Results",body:"COPY is the words you write at each funnel stage.\n\nHEADLINES THAT WORK:\nHow to create professional videos in 10 minutes - no experience needed\nThe AI tool that saved me 6 hours of video editing every week\nSmall business owners in Texas are using this to get 10x more customers\n\nEMAIL SUBJECT LINES THAT GET OPENED:\nI cannot believe how easy this is...\nYou asked me how I make those videos...\nThis changes everything for small businesses\n\nCTA PHRASES THAT CONVERT:\nClick here to try it free - no credit card needed\nGet started in the next 10 minutes\nJoin 50,000 creators already using this\nLimited time - try free for 7 days\n\nKEY RULE: Every piece of copy should answer ONE question:\nWHAT IS IN IT FOR ME?\nIf your copy does not answer that clearly - rewrite it.\n\nUSE HUB ENGINE V4 SALES FUNNEL BUILDER to generate all of this automatically."}
]},
{id:"business",emoji:"💼",title:"Local Business Sales System",color:"#fb923c",lessons:[
{title:"Your Sales Pitch for Local Businesses",body:"YOU ARE OFFERING: A weekly 45-second professional video - delivered every week - posted to their social media.\n\nYOUR ELEVATOR PITCH (say this in 60 seconds):\nHi, my name is John Lanter. I run an AI media production company here in Southeast Texas. I create professional 45-second promotional videos for local businesses using the latest AI technology. Each video showcases your business professionally and gets posted to your social media every single week. No cameras, no film crews, no complicated editing. Just a clean professional video every week that keeps your customers engaged and brings in new ones. I can show you a sample video right now on my phone. Would you have 2 minutes to take a look?\n\nTHEN SHOW THEM THE SAMPLE VIDEO YOU MADE WITH VIDNOZ.\nIf they like it - you have a client."},
{title:"Pricing Your Video Service",body:"RECOMMENDED PRICING PACKAGES:\n\nSTARTER - $200/month\n- 1 video per week (4 per month)\n- Posted to one platform\n- Basic script and voiceover\n- Best for: small local businesses\n\nPROFESSIONAL - $400/month\n- 2 videos per week (8 per month)\n- Posted to two platforms\n- Custom scripts for their business\n- Monthly performance report\n- Best for: restaurants, retail, salons, contractors\n\nPREMIUM - $700/month\n- Daily video content\n- All platforms\n- Custom anchor character for their brand\n- Best for: car dealers, real estate, medical offices\n\nYOUR FIRST CLIENT OFFER:\nLet me create your first 2 videos completely free - no commitment. If you love them we talk about a monthly package. If not you keep the videos at no charge.\n\nTHAT REMOVES ALL RISK FOR THEM. Almost no one says no to free."},
{title:"Handling Objections Like a Pro",body:"OBJECTION 1: I cannot afford it right now\nYOUR RESPONSE: I completely understand. That is exactly why I offer a free trial - two videos at zero cost. Once you see the results those videos bring in, the investment more than pays for itself. Let me show you a sample right now.\n\nOBJECTION 2: We already have someone doing our social media\nYOUR RESPONSE: That is great! Video content is the number one driver of engagement on every platform right now. I am not replacing what you have - I am adding the most powerful element: professional video.\n\nOBJECTION 3: I need to think about it\nYOUR RESPONSE: Of course. While you think about it, let me create one sample video for your business - completely free. You get to see exactly what you would receive. Can I get your business name?\n\nOBJECTION 4: How do I know this works?\nYOUR RESPONSE: Great question. Businesses using weekly video content see 3x more engagement than static posts. Let me show you a sample video I made for a business just like yours."}
]},
{id:"anchors",emoji:"🎭",title:"Making Videos With Your 4 Anchors",color:"#e879f9",lessons:[
{title:"Understanding Your 4 Anchors",body:"LISA - Lead Anchor\nBackground: English Asian, mid-30s, professional news anchor\nVoice: Smooth, authoritative, credible, cutting-edge\nBest for: Tech news, AI developments, industry analysis\nThink of her as: Your CNN anchor\n\nALISHA - Business Reporter\nBackground: Mexican-American, 40+, charismatic influencer energy\nVoice: Dynamic, persuasive, trend-forward, exciting\nBest for: Affiliate promos, business news, product launches\nThink of her as: QVC host meets news reporter\n\nSUSAN - Feature Correspondent\nBackground: White female, 38-40, warm and relatable\nVoice: Friendly, trustworthy, human-interest\nBest for: Lifestyle content, small business stories, how-to videos\nThink of her as: Your local news feature reporter\n\nPAUL - Breaking News Anchor\nBackground: White male, 60s, grandfather authority\nVoice: Bold, direct, no-nonsense, high impact\nBest for: Breaking news, urgent content, bold claims\nThink of her as: Your Walter Cronkite"},
{title:"Writing Scripts For Lisa",body:"LISA SCRIPT FORMULA:\n\nOPENING (3 seconds): Lead with a hard fact or major development\nExample: Tonight - artificial intelligence just made its biggest move yet.\n\nBODY (40 seconds): Professional analysis, clear facts\n- Use statistics when possible\n- Keep sentences medium length\n- Avoid slang or casual language\n\nCLOSING (7 seconds): Professional and direct\nExample: For the full breakdown and resources, visit the link below. I am Lisa - and this has been your AI update.\n\nSAMPLE PROMPT FOR LISA:\nWrite a 45-second news script for Lisa, a professional English Asian news anchor in her mid-30s. Topic: AI tools saving small businesses 10 hours per week. Tone: authoritative, credible, CNN-style. Include one statistic. End with a call to action.\n\nLISA WORKS BEST FOR: AI Weekly Roundup, Tech Headlines Daily, serious news content."},
{title:"Writing Scripts For Alisha",body:"ALISHA SCRIPT FORMULA:\n\nOPENING (3 seconds): High energy, excitement, FOMO trigger\nExample: You are NOT going to believe what this AI tool just did for my content...\n\nBODY (40 seconds): Personal, enthusiastic, benefit-focused\n- Use YOU language constantly\n- Share results and transformations\n- Keep energy HIGH throughout\n- Short punchy sentences\n\nCLOSING (7 seconds): Urgent, exciting, action-focused\nExample: I have the link right here - click it, try it free, and thank me later.\n\nSAMPLE PROMPT FOR ALISHA:\nWrite a 45-second promo script for Alisha, a charismatic Mexican-American influencer in her 40s. Product: Vidnoz AI video creator. Tone: exciting, high-energy, persuasive. Focus on ease of use. Include FOMO and urgent CTA.\n\nALISHA WORKS BEST FOR: Affiliate promos, product launches, anything needing sales energy."},
{title:"Writing Scripts For Susan and Paul",body:"SUSAN SCRIPT FORMULA:\n\nOPENING: Warm, relatable, start with a human story\nExample: A small business owner in Texas just discovered something that is changing the way she reaches her customers...\n\nBODY: Conversational, empathetic, benefit-focused for real people\n- Tell stories not facts\n- Use everyday language\n- Focus on how it helps REAL people\n\nCLOSING: Encouraging and supportive\nExample: If you have been looking for a simpler way to grow your business - this is it. This is Susan - and this one is for you.\n\n---\n\nPAUL SCRIPT FORMULA:\n\nOPENING: BOLD, direct, commanding\nExample: BREAKING - The AI revolution just hit small business and nothing will be the same.\n\nBODY: Short punchy sentences. Facts. Authority.\n- Maximum 8 words per sentence where possible\n- Hard stops between ideas\n\nCLOSING: Direct command\nExample: Click the link. Do it now. This is Paul - and that is the news."},
{title:"Complete Video Production Workflow",body:"STEP BY STEP FROM IDEA TO PUBLISHED VIDEO:\n\nSTEP 1 - CHOOSE YOUR ANCHOR\nTech news = Lisa\nPromo = Alisha\nHuman story = Susan\nBreaking = Paul\n\nSTEP 2 - WRITE THE SCRIPT IN HUB ENGINE\nGo to AI Tools - Video Script Writer\nUse the specific prompt formula for your chosen anchor\nGenerate - review - refine - save to Script Archive\n\nSTEP 3 - CREATE THE VIDEO IN VIDNOZ\nChoose avatar matching your anchor\nPaste your script\nSelect ElevenLabs voice ID for that anchor\nGenerate and preview\n\nSTEP 4 - POLISH IN CAPCUT\nAdd captions (auto-generated)\nAdd your logo or watermark\nAdd music if needed\nExport final version\n\nSTEP 5 - WRITE SOCIAL CONTENT\nHub Engine - Social Caption Pack - all 5 platforms\nHashtag Strategy Pro - 30 hashtags\nAdd affiliate link to description\n\nSTEP 6 - SCHEDULE AND PUBLISH\nAdd to Content Calendar in Hub Engine\nPost to your platforms\nTrack views in Video Library\n\nTOTAL TIME: 30-45 minutes per video once you have practiced this 5 times."}
]},
{id:"roadmap",emoji:"🗺️",title:"Your Personal 8-Week Roadmap",color:"#34d399",lessons:[
{title:"Week 1 - Foundation",body:"GOAL: Learn your tools. Make your first video.\n\nDAY 1 - Monday (30 minutes)\n- Read: What Is AI Video Generation\n- Sign up for InVideo AI free account\n- Watch their intro tutorial\n\nDAY 2 - Tuesday (30 minutes)\n- Read: The 5-Part Prompt Formula\n- Practice writing 3 prompts for different topics\n- Use Prompt Engineer Pro in Hub Engine\n\nDAY 3 - Wednesday (45 minutes)\n- Read: Making Your First Video with InVideo\n- CREATE YOUR FIRST VIDEO - any AI news topic\n- Do not worry about perfect - just complete it\n\nDAY 4 - Thursday (30 minutes)\n- Read: Understanding Your 4 Anchors\n- Write one script for Lisa in Hub Engine\n- Save to Script Archive\n\nDAY 5 - Friday (45 minutes)\n- Sign up for Vidnoz free account\n- Create your first avatar video using your Lisa script\n- Download and watch it back\n\nWEEK 1 MILESTONE: 2 videos created. Tools set up. First scripts written."},
{title:"Week 2-3 - Build Your Skills",body:"WEEK 2 GOAL: Master the anchor workflow.\n\nMONDAY: Write and create a Lisa video (Tech/AI topic)\nTUESDAY: Write and create an Alisha video (Vidnoz promo)\nWEDNESDAY: Write and create a Susan video (small business story)\nTHURSDAY: Write and create a Paul video (breaking news)\nFRIDAY: Review all 4 videos - what works? What to improve?\n\nWEEK 3 GOAL: Start posting and learn affiliate content.\n\nMONDAY: Read Affiliate Marketing Mastery lessons\nTUESDAY: Sign up for Vidnoz affiliate program\nWEDNESDAY: Create your first affiliate promo video with Alisha\nTHURSDAY: Post to YouTube and TikTok - add affiliate link\nFRIDAY: Set up your Content Calendar for next 2 weeks\n\nWEEK 2-3 MILESTONE: 8 videos created. Affiliate links active. Content calendar running."},

function ContentCalendar({events,setEvents}){

  function openEdit(ev){setForm({...ev});setEditEvt(ev.id);setShowForm(true);}
  function save(){if(!form.title.trim())return;const et=EVENT_TYPES.find(x=>x.type===form.type)||EVENT_TYPES[0];const ev={...form,emoji:et.emoji,color:et.color};if(editEvt){setEvents(p=>p.map(e=>e.id===editEvt?{...ev,id:editEvt}:e));}else{setEvents(p=>[...p,{...ev,id:uid()}]);}setShowForm(false);}
  function del(id){if(confirm("Delete?"))setEvents(p=>p.filter(e=>e.id!==id));}

  function getWeek(){const d=new Date(curDate);d.setDate(d.getDate()-d.getDay());return Array.from({length:7},(_,i)=>{const x=new Date(d);x.setDate(d.getDate()+i);return x;});}
  const weekDays=getWeek();
  const upcoming=[...events].filter(e=>e.date>=today()).sort((a,b)=>a.date.localeCompare(b.date));
  const prev=()=>{const d=new Date(curDate);mode==="month"?d.setMonth(d.getMonth()-1):d.setDate(d.getDate()-7);setCurDate(d);};

  function markDone(trackId,idx){const key=trackId+"_"+idx;store.set("learn_progress",{...progress,[key]:!progress[key]});}

          <button onClick={()=>setSelLesson(null)} style={{...C.ghost,padding:"7px 14px",fontSize:12}}>Back to {track.title}</button>
          <div style={{flex:1}}><div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:20,fontWeight:900,color:"#fff"}}>{lesson.title}</div><div style={{fontSize:11,color:track.color,marginTop:2}}>{track.emoji} {track.title}</div></div>
          <button onClick={()=>markDone(selTrack,selLesson)} style={{background:done?"rgba(16,185,129,.15)":"rgba(255,255,255,.05)",border:`1px solid ${done?"#10b981":"#2a3040"}`,color:done?"#10b981":"#9aa0b0",borderRadius:10,padding:"8px 16px",cursor:"pointer",fontSize:12,fontWeight:700}}>{done?"Completed!":"Mark Complete"}</button>
        </div>
        <div style={{...C.card,border:`1px solid ${track.color}33`}}>
          <div style={{fontSize:13,color:"#d1d5e0",lineHeight:1.9,whiteSpace:"pre-wrap"}}>{lesson.body}</div>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:16,gap:10}}>
          {selLesson>0?<button onClick={()=>setSelLesson(selLesson-1)} style={{...C.ghost,flex:1,justifyContent:"center"}}>Previous</button>:<div style={{flex:1}}/>}
          {selLesson<track.lessons.length-1?<button onClick={()=>setSelLesson(selLesson+1)} style={{...C.gold,flex:1,justifyContent:"center"}}>Next Lesson</button>:<button onClick={()=>setSelLesson(null)} style={{...C.gold,flex:1,justifyContent:"center"}}>Track Complete!</button>}
        </div>
      </div>
    );
  }
  if(selTrack){
    const track=tracks.find(t=>t.id===selTrack);
    const done=getProgress(selTrack,track.lessons.length);
    return(
      <div style={{animation:"slideIn .35s ease"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
          <button onClick={()=>setSelTrack(null)} style={{...C.ghost,padding:"7px 14px",fontSize:12}}>All Tracks</button>
          <div style={{flex:1}}><div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:22,fontWeight:900,color:"#fff"}}>{track.emoji} {track.title}</div><div style={{fontSize:11,color:"#8891a8",marginTop:2}}>{done}/{track.lessons.length} completed</div></div>
          <div style={{background:`${track.color}18`,border:`1px solid ${track.color}33`,borderRadius:10,padding:"6px 14px",fontSize:13,fontWeight:700,color:track.color}}>{Math.round(done/track.lessons.length*100)}%</div>
        </div>
        <div style={{height:4,background:"#1e2433",borderRadius:2,marginBottom:22,overflow:"hidden"}}><div style={{height:"100%",background:track.color,borderRadius:2,width:`${Math.round(done/track.lessons.length*100)}%`,transition:"width .4s"}}/></div>
        <div style={{display:"flex",flexDirection:"column",gap:11}}>
          {track.lessons.map((lesson,i)=>{const isDone=progress[selTrack+"_"+i];return(
            <div key={i} onClick={()=>setSelLesson(i)} style={{...C.card,display:"flex",alignItems:"center",gap:14,cursor:"pointer",border:`1px solid ${isDone?"#10b98133":"#1e2433"}`,borderLeft:`4px solid ${isDone?"#10b981":track.color}`,transition:"all .2s"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,.055)"} onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,.035)"}>
              <div style={{width:34,height:34,borderRadius:10,background:isDone?"rgba(16,185,129,.15)":`${track.color}16`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:15}}>{isDone?"✅":i+1}</div>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:isDone?"#10b981":"#e8eaf0"}}>{lesson.title}</div><div style={{fontSize:10,color:"#4a5166",marginTop:2}}>{isDone?"Completed":"Click to read"}</div></div>
              <span style={{color:"#4a5166",fontSize:18}}>›</span>
            </div>
          );})}
        </div>
      </div>
    );
  }
  return(
    <div style={{animation:"slideIn .35s ease"}}>
      <div style={{marginBottom:20}}><div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:22,fontWeight:900,color:"#fff"}}>Learning Center</div><div style={{fontSize:12,color:"#8891a8",marginTop:2}}>7 tracks built specifically for you, John. Your path from idea to income.</div></div>
      <div style={{...C.card,background:"linear-gradient(135deg,rgba(240,165,0,.08),rgba(0,180,255,.05))",border:"1px solid rgba(240,165,0,.2)",marginBottom:20}}>
        <div style={{fontSize:13,color:"#e8eaf0",lineHeight:1.8}}><strong style={{color:"#f0a500",fontSize:14}}>John — this is your personal AI university.</strong><br/>Every lesson is written specifically for you. Your background, your goals, your pace. Start with Track 1 and work through one lesson per day.</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        {tracks.map(track=>{
          const done=getProgress(track.id,track.lessons.length);
          const pct=Math.round(done/track.lessons.length*100);
          return(
            <div key={track.id} onClick={()=>setSelTrack(track.id)} style={{...C.card,cursor:"pointer",borderLeft:`4px solid ${track.color}`,transition:"all .2s"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,.055)"} onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,.035)"}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                <div style={{width:44,height:44,borderRadius:13,background:`${track.color}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{track.emoji}</div>
                <div style={{flex:1}}><div style={{fontSize:14,fontWeight:700,color:"#fff"}}>{track.title}</div><div style={{fontSize:10,color:"#6b7485",marginTop:2}}>{track.lessons.length} lessons</div></div>
                <div style={{fontSize:13,fontWeight:700,color:pct>0?track.color:"#4a5166"}}>{pct}%</div>
              </div>
              <div style={{height:3,background:"#1e2433",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",background:track.color,borderRadius:2,width:`${pct}%`,transition:"width .4s"}}/></div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

  const members=[

    {name:"Becky",role:"Creative Director",emoji:"🎨",color:"#e879f9",desc:"The creative force behind every show. Shapes brand voice, visual identity, and content direction.",skills:["Creative Direction","Brand Voice","Content Strategy","Visual Design","Storytelling","Production"]},

        <div style={{fontSize:9,color:"#f0a500",fontWeight:700,letterSpacing:5,marginBottom:9}}>THE MISSION</div>

            <div style={{fontSize:12,color:"#8891a8",lineHeight:1.65,margin:"12px 0"}}>{m.desc}</div>

function Settings(){
  const [elKey,setElKey]=useState(()=>store.get("elkey",""));
  const [saved,setSaved]=useState(false),[testing,setTesting]=useState(false),[selVoice,setSelVoice]=useState("becky");
  function saveKey(){if(!elKey.trim())return;store.set("elkey",elKey.trim());setSaved(true);setTimeout(()=>setSaved(false),2500);}
  async function testVoice(){
    const key=store.get("elkey","");if(!key){alert("Save your ElevenLabs key first!");return;}
    setTesting(true);
    const texts={becky:"Hello John darling! Becky here, your British Creative Director. Ready to make something brilliant today!",susan:"Hi John, Susan here. Ready to deliver your story.",alisha:"Hey John, Alisha here. Let us make something amazing!",lisa:"Good evening John. Lisa here. Ready to deliver the news.",paul:"John. Paul here. Let us get to work."};
    await speakEL(texts[selVoice]||texts.becky,selVoice);
    setTimeout(()=>setTesting(false),3000);
  }
  const hasKey=!!store.get("elkey","");
  return(
    <div style={{animation:"slideIn .35s ease"}}>
      <div style={{marginBottom:20}}><div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:22,fontWeight:900,color:"#fff"}}>Settings</div><div style={{fontSize:12,color:"#8891a8",marginTop:2}}>API keys, voice controls, and your profile.</div></div>
      <div style={{...C.card,border:"1px solid rgba(240,165,0,.25)",marginBottom:16}}>
        <div style={{fontWeight:700,color:"#fff",fontSize:15,marginBottom:4}}>ElevenLabs Voice API</div>
        <div style={{fontSize:12,color:"#8891a8",marginBottom:16}}>Powers all 5 voices. Get your key at elevenlabs.io</div>
        <label style={C.lbl}>YOUR ELEVENLABS API KEY</label>
        <input type="password" value={elKey} onChange={e=>setElKey(e.target.value)} placeholder="sk_..." style={{...C.inp,border:"1px solid #1e2433",marginBottom:10}}/>
        <div style={{display:"flex",gap:9}}>
          <button onClick={saveKey} style={{...C.gold,flex:1,justifyContent:"center"}}>{saved?"Key Saved!":"Save Key"}</button>
          {hasKey&&<button onClick={()=>{store.set("elkey","");setElKey("");}} style={{...C.ghost,padding:"10px 16px"}}>Clear</button>}
        </div>
        {hasKey&&<div style={{marginTop:10,fontSize:11,color:"#10b981",background:"rgba(16,185,129,.1)",border:"1px solid rgba(16,185,129,.25)",borderRadius:8,padding:"7px 12px"}}>ElevenLabs key saved — voices are active!</div>}
      </div>
      <div style={{...C.card,marginBottom:16}}>
        <div style={{fontWeight:700,color:"#fff",fontSize:15,marginBottom:14}}>Voice Test Studio</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginBottom:14}}>
          {Object.entries(VOICE_IDS).map(([k])=>(
            <div key={k} onClick={()=>setSelVoice(k)} style={{background:selVoice===k?"rgba(240,165,0,.12)":"rgba(255,255,255,.03)",border:`1px solid ${selVoice===k?"#f0a500":"#1e2433"}`,borderRadius:10,padding:"10px 6px",textAlign:"center",cursor:"pointer"}}>
              <div style={{fontSize:20,marginBottom:4}}>{k==="becky"?"🎨":k==="susan"?"👱‍♀️":k==="alisha"?"👩":k==="lisa"?"👧":"👴"}</div>
              <div style={{fontSize:11,fontWeight:700,color:selVoice===k?"#f0a500":"#8891a8"}}>{k.charAt(0).toUpperCase()+k.slice(1)}</div>
            </div>
          ))}
        </div>
        <button onClick={testVoice} disabled={testing} style={{...C.gold,width:"100%",justifyContent:"center",opacity:testing?.6:1}}>{testing?"Playing...":"Test "+VOICE_IDS[selVoice]?.label+" Voice"}</button>
      </div>
      <div style={C.card}>
        <div style={{fontWeight:700,color:"#fff",fontSize:15,marginBottom:14}}>John Lanter — CEO</div>
        <div style={{fontSize:12,color:"#9aa0b8",lineHeight:2}}>
          <div>Location: Orange, Texas</div>
          <div>Background: 22+ years industrial ops, forklift certified, former 9-state sales rep</div>
          <div>Current: CEO of Hub Engine, Affiliate Marketing, AI Video Production</div>
          <div style={{marginTop:8,color:"#f0a500",fontWeight:700}}>Three Minds - One Mission - Zero Cost</div>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [authed,setAuthed]=useState(false),[tab,setTab]=useState("dashboard");
  const [videos,setVidRaw]=useState(()=>store.get("videos",[]));
  const [scripts,setScrRaw]=useState(()=>store.get("scripts",[]));
  const [events,setEvtRaw]=useState(()=>store.get("events",[]));
  const setVideos=fn=>{setVidRaw(p=>{const n=typeof fn==="function"?fn(p):fn;store.set("videos",n);return n;});};
  const setScripts=fn=>{setScrRaw(p=>{const n=typeof fn==="function"?fn(p):fn;store.set("scripts",n);return n;});};
  const setEvents=fn=>{setEvtRaw(p=>{const n=typeof fn==="function"?fn(p):fn;store.set("events",n);return n;});};
  const nav=[
    {id:"dashboard",label:"Dashboard",icon:"📊"},
    {id:"tools",label:"AI Tools",icon:"⚡"},
    {id:"library",label:"Video Library",icon:"🎬",badge:()=>videos.length},
    {id:"archive",label:"Scripts",icon:"📄",badge:()=>scripts.length},
    {id:"calendar",label:"Calendar",icon:"📅",badge:()=>events.length},
    {id:"studio",label:"News Studio",icon:"📺"},
    {id:"affiliates",label:"Affiliates",icon:"💰"},
    {id:"jobs",label:"Jobs",icon:"💼"},
    {id:"claude",label:"Claude Chat",icon:"💬"},
    {id:"becky",label:"Becky Chat",icon:"🎨"},
    {id:"learn",label:"Learning",icon:"📚"},
    {id:"team",label:"Team HQ",icon:"👥"},
    {id:"settings",label:"Settings",icon:"⚙️"},
  ];
  if(!authed)return <Gate onAuth={()=>setAuthed(true)}/>;
  return(
    <div style={{minHeight:"100vh",background:"#06070d",display:"flex"}}>
      <aside style={{width:200,background:"#080b12",borderRight:"1px solid #141820",display:"flex",flexDirection:"column",position:"fixed",top:0,left:0,height:"100vh",zIndex:100}}>
        <div style={{padding:"18px 14px 14px",borderBottom:"1px solid #141820",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            <div style={{width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,#f0a500,#c06000)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,animation:"glow 3s infinite",flexShrink:0}}>⚡</div>
            <div><div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:12,fontWeight:900,color:"#fff",letterSpacing:-.4}}>HUB ENGINE</div><div style={{fontSize:8,color:"#f0a500",fontWeight:700,letterSpacing:3}}>V 4 . 0</div></div>
          </div>
        </div>
        <nav style={{flex:1,padding:"10px 6px",overflowY:"auto"}}>
          {nav.map(n=>{const on=tab===n.id,bc=n.badge?n.badge():0;return(
            <button key={n.id} onClick={()=>setTab(n.id)} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"8px 10px",borderRadius:8,marginBottom:2,border:"none",background:on?"rgba(240,165,0,.1)":"transparent",color:on?"#f0a500":"#8891a8",cursor:"pointer",fontSize:11,fontWeight:on?600:400,transition:"all .15s",textAlign:"left"}} onMouseEnter={e=>{if(!on){e.currentTarget.style.background="rgba(255,255,255,.04)";e.currentTarget.style.color="#c8d0e0";}}} onMouseLeave={e=>{if(!on){e.currentTarget.style.background="transparent";e.currentTarget.style.color="#8891a8";}}}>
              <span style={{fontSize:13}}>{n.icon}</span>
              <span style={{flex:1}}>{n.label}</span>
              {bc>0&&<span style={{fontSize:9,fontWeight:700,background:"rgba(240,165,0,.18)",color:"#f0a500",borderRadius:9,padding:"1px 6px"}}>{bc}</span>}
              {on&&<span style={{width:4,height:4,borderRadius:"50%",background:"#f0a500",flexShrink:0}}/>}
            </button>
          );})}
        </nav>
        <div style={{padding:"10px 6px",borderTop:"1px solid #141820",flexShrink:0}}>
          <div style={{fontSize:8,color:"#242c3a",textAlign:"center",lineHeight:1.7,marginBottom:7}}>Three Minds · One Mission<br/>Zero Cost · Orange, TX</div>
          <button onClick={()=>setAuthed(false)} style={{...C.ghost,width:"100%",justifyContent:"center",fontSize:10,padding:"7px",borderRadius:7}}>Lock Hub</button>
        </div>
      </aside>
      <main style={{marginLeft:200,flex:1,padding:"26px 30px",minHeight:"100vh"}}>
        <div style={{maxWidth:1000}}>
          {tab==="dashboard"&&<Dashboard setTab={setTab} videos={videos} scripts={scripts} events={events}/>}
          {tab==="tools"&&<AITools onSaveScript={s=>setScripts(p=>[...p,s])}/>}
          {tab==="library"&&<VideoLibrary videos={videos} setVideos={setVideos}/>}
          {tab==="archive"&&<ScriptArchive scripts={scripts} setScripts={setScripts}/>}
          {tab==="calendar"&&<ContentCalendar events={events} setEvents={setEvents}/>}
          {tab==="studio"&&<Studio/>}
          {tab==="affiliates"&&<Affiliates/>}
          {tab==="jobs"&&<Jobs/>}
          {tab==="claude"&&<ClaudeChat/>}
          {tab==="becky"&&<BeckyChat/>}
          {tab==="learn"&&<LearnCenter/>}
          {tab==="team"&&<Team/>}
          {tab==="settings"&&<Settings/>}
        </div>
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
