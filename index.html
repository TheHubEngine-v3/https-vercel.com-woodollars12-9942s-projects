  {name:"InVideo",   commission:"30%",        cat:"AI Video Editor",    color:"#7c3aed",url:"https://invideo.io",          desc:"Templates + AI editing for short-form video", badge:"POPULAR",      icon:"⭐"},

// ── HELPERS ───────────────────────────────────────────────────────────────────
function copyText(text, setCopied){ navigator.clipboard.writeText(text).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);}); }

const css = {
  card:   {background:"rgba(255,255,255,0.035)",border:"1px solid #1e2433",borderRadius:16,padding:24},
  gold:   {background:"linear-gradient(135deg,#f0a500,#d08000)",color:"#000",fontWeight:700,border:"none",borderRadius:10,padding:"11px 22px",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",gap:8},
  ghost:  {background:"transparent",border:"1px solid #2a3040",color:"#9aa0b0",borderRadius:10,padding:"11px 22px",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",gap:8},
  input:  {width:"100%",background:"#080b12",border:"1px solid #1e2433",borderRadius:10,padding:"12px 15px",color:"#e8eaf0",fontSize:13,fontFamily:"'DM Sans',sans-serif",resize:"vertical"},

// ── PASSWORD GATE ─────────────────────────────────────────────────────────────
function Gate({onAuth}){
  const [pw,setPw]=useState("");
  const [show,setShow]=useState(false);
  const [err,setErr]=useState(false);
  const [shake,setShake]=useState(false);
  function attempt(){
    if(pw===PASSWORD){onAuth();}
    else{setErr(true);setShake(true);setTimeout(()=>setShake(false),500);setTimeout(()=>setErr(false),2500);}
  }
  return (
    <div style={{minHeight:"100vh",background:"#06070d",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
      <div style={{position:"fixed",inset:0,backgroundImage:"radial-gradient(ellipse at 50% 50%, rgba(240,165,0,0.07) 0%, transparent 65%), linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px)",backgroundSize:"100%,52px 52px,52px 52px",pointerEvents:"none"}}/>
      <div style={{width:420,position:"relative",zIndex:2,animation:"fadeUp .6s ease forwards"}}>
        <div style={{textAlign:"center",marginBottom:36}}>
          <div style={{width:76,height:76,borderRadius:22,background:"linear-gradient(135deg,#f0a500,#c06000)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 18px",fontSize:30,animation:"glow 3s infinite"}}>⚡</div>
          <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:30,fontWeight:900,color:"#fff",letterSpacing:-1.5}}>HUB ENGINE</div>
          <div style={{fontSize:11,color:"#f0a500",fontWeight:700,letterSpacing:5,marginTop:5}}>V 4 . 0</div>
        </div>
        <div style={{background:"rgba(255,255,255,0.04)",border:`1px solid ${err?"#ef4444":"#1e2433"}`,borderRadius:22,padding:36,backdropFilter:"blur(20px)",transition:"border-color .3s",animation:shake?"shake .4s ease":"none"}}>
          <div style={{fontSize:11,color:"#8891a8",fontWeight:700,letterSpacing:2,marginBottom:8}}>ACCESS CODE</div>
          <div style={{position:"relative"}}>
            <input type={show?"text":"password"} value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&attempt()}
              placeholder="Enter your access code..."
              style={{...css.input,fontSize:16,padding:"14px 48px 14px 16px",borderColor:err?"#ef4444":"#1e2433"}}
              autoFocus/>
            <button onClick={()=>setShow(!show)} style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#8891a8",cursor:"pointer",fontSize:18,lineHeight:1}}>
              {show?"🙈":"👁️"}
            </button>
          </div>
          {err&&<div style={{color:"#ef4444",fontSize:13,marginTop:8}}>❌ Invalid access code — try again.</div>}
          <button onClick={attempt} style={{...css.gold,width:"100%",justifyContent:"center",marginTop:20,padding:"14px",fontSize:15,borderRadius:12}}>
            🔒 ENTER HUB ENGINE
          </button>
          <div style={{textAlign:"center",marginTop:14,fontSize:12,color:"#3a4156"}}>Three Minds · One Mission · Zero Cost</div>
        </div>
      </div>
    </div>
  );
}

              onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,0.035)";e.currentTarget.style.borderLeftColor=t.color;}}>

// ── AI TOOLS ──────────────────────────────────────────────────────────────────
function AITools(){
  const [sel,setSel]=useState(null);
  const [input,setInput]=useState("");
  const [output,setOutput]=useState("");
  const [loading,setLoading]=useState(false);
  const [copied,setCopied]=useState(false);
  const [cat,setCat]=useState("All");

  const cats=["All",...[...new Set(TOOLS.map(t=>t.cat))]];
  const filtered=cat==="All"?TOOLS:TOOLS.filter(t=>t.cat===cat);

  async function run(){
    if(!input.trim()||!sel)return;
    setLoading(true);setOutput("");
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sel.sys,messages:[{role:"user",content:input}]})
      });
      const d=await r.json();
      setOutput(d.content?.map(b=>b.text||"").join("")||"⚠️ No response. Check API key in settings.");
    }catch(e){setOutput("⚠️ Connection error — please try again.");}
    setLoading(false);
  }

  return (
    <div style={{animation:"slideIn .4s ease"}}>
      {/* Header + category filter */}
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:24,fontWeight:900,color:"#fff"}}>AI Tools Hub</div>
          <div style={{fontSize:13,color:"#8891a8",marginTop:2}}>12 Claude-powered tools — pick one and make magic.</div>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {cats.map(c=>(
            <button key={c} onClick={()=>setCat(c)} style={{fontSize:11,fontWeight:700,padding:"5px 12px",borderRadius:7,border:`1px solid ${cat===c?"#f0a500":"#1e2433"}`,background:cat===c?"rgba(240,165,0,.12)":"transparent",color:cat===c?"#f0a500":"#8891a8",cursor:"pointer",letterSpacing:.5}}>{c}</button>
          ))}
        </div>
      </div>

      {/* Tool grid */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:20}}>
        {filtered.map(t=>(
          <button key={t.id} onClick={()=>{setSel(t);setInput("");setOutput("");}}
            style={{background:sel?.id===t.id?`${t.color}14`:"rgba(255,255,255,0.03)",border:`1px solid ${sel?.id===t.id?t.color:"#1e2433"}`,borderRadius:14,padding:16,textAlign:"left",cursor:"pointer",transition:"all .18s"}}
            onMouseEnter={e=>{if(sel?.id!==t.id){e.currentTarget.style.borderColor=`${t.color}55`;e.currentTarget.style.background="rgba(255,255,255,0.05)";}}}
            onMouseLeave={e=>{if(sel?.id!==t.id){e.currentTarget.style.borderColor="#1e2433";e.currentTarget.style.background="rgba(255,255,255,0.03)";}}}
          >
            <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
              <span style={{fontSize:22,lineHeight:1}}>{t.emoji}</span>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:"#e8eaf0",lineHeight:1.3}}>{t.name}</div>
                <div style={{fontSize:11,color:"#5a6275",marginTop:3,lineHeight:1.4}}>{t.desc}</div>
              </div>
            </div>
            <div style={{marginTop:10,...css.tag(t.color),display:"inline-block"}}>{t.cat}</div>
          </button>
        ))}
      </div>

      {/* Workspace */}
      {sel ? (
        <div style={{...css.card,border:`1px solid ${sel.color}44`}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20,paddingBottom:16,borderBottom:"1px solid #1a1f2e"}}>
            <div style={{width:44,height:44,borderRadius:13,background:`${sel.color}20`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{sel.emoji}</div>
            <div>
              <div style={{fontSize:16,fontWeight:700,color:"#fff"}}>{sel.name}</div>
              <div style={{fontSize:12,color:"#8891a8"}}>{sel.desc}</div>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            <div>
              <div style={{fontSize:11,color:"#8891a8",fontWeight:700,letterSpacing:1,marginBottom:8}}>YOUR INPUT</div>
              <textarea value={input} onChange={e=>setInput(e.target.value)} placeholder={`Describe what you need for ${sel.name.toLowerCase()}...`} style={{...css.input,height:168,border:"1px solid #1e2433"}}/>
              <button onClick={run} disabled={loading||!input.trim()} style={{...css.gold,marginTop:10,width:"100%",justifyContent:"center",opacity:loading||!input.trim()?.5:1}}>
                {loading?<><span style={{display:"inline-block",animation:"spin 1s linear infinite"}}>⟳</span> Generating...</>:<>⚡ Generate with Claude AI</>}
              </button>
            </div>
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontSize:11,color:"#8891a8",fontWeight:700,letterSpacing:1}}>AI OUTPUT</div>
                {output&&<button onClick={()=>copyText(output,setCopied)} style={{background:"none",border:"1px solid #1e2433",borderRadius:7,padding:"4px 10px",color:"#8891a8",cursor:"pointer",fontSize:11,display:"flex",alignItems:"center",gap:5}}>
                  {copied?"✅ Copied!":"📋 Copy"}
                </button>}
              </div>
              <div style={{background:"#060810",border:"1px solid #14181f",borderRadius:10,padding:14,minHeight:168,maxHeight:300,overflowY:"auto"}}>
                {loading?<div style={{color:"#8891a8",fontSize:13,display:"flex",alignItems:"center",gap:10,padding:6}}><span style={{display:"inline-block",animation:"spin 1s linear infinite",color:sel.color}}>⟳</span> AI is crafting your content...</div>
                :output?<div style={{fontSize:13,color:"#d1d5e0",lineHeight:1.75,whiteSpace:"pre-wrap"}}>{output}</div>
                :<div style={{fontSize:13,color:"#3a4156",fontStyle:"italic",padding:6}}>Your Claude-powered output will appear here...</div>}
              </div>
            </div>
          </div>
        </div>
      ) : (
        <div style={{...css.card,textAlign:"center",padding:44,border:"1px dashed #1a1f2e"}}>
          <div style={{fontSize:40,marginBottom:12}}>⚡</div>
          <div style={{fontSize:16,fontWeight:600,color:"#6b7485"}}>Select a tool above to begin</div>
          <div style={{fontSize:13,color:"#3a4156",marginTop:6}}>12 Claude-powered tools ready to fire</div>
        </div>
      )}
    </div>
  );
}

// ── NEWS STUDIO ───────────────────────────────────────────────────────────────
function Studio(){
  const [active,setActive]=useState(null);

  return (
    <div style={{animation:"slideIn .4s ease"}}>
      <div style={{marginBottom:22}}>
        <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:24,fontWeight:900,color:"#fff"}}>News Studio</div>
        <div style={{fontSize:13,color:"#8891a8",marginTop:2}}>{totalEp} episodes produced · 4 AI anchors always on.</div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18,marginBottom:24}}>
        {HOSTS.map(h=>(
          <div key={h.name} onClick={()=>setActive(active?.name===h.name?null:h)}
            style={{...css.card,border:`1px solid ${active?.name===h.name?h.color:"#1e2433"}`,cursor:"pointer",transition:"all .22s"}}
            onMouseEnter={e=>e.currentTarget.style.borderColor=h.color}
            onMouseLeave={e=>{if(active?.name!==h.name)e.currentTarget.style.borderColor="#1e2433";}}>
            <div style={{display:"flex",alignItems:"center",gap:16}}>
              <div style={{width:62,height:62,borderRadius:18,background:`${h.color}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,border:`2px solid ${h.color}33`,flexShrink:0}}>{h.emoji}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:18,fontWeight:800,color:"#fff",letterSpacing:-.3}}>{h.name}</div>
                <div style={{fontSize:12,color:h.color,fontWeight:700,marginTop:2}}>{h.role}</div>
                <div style={{fontSize:12,color:"#8891a8",marginTop:1}}>{h.specialty}</div>

              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:26,fontWeight:900,color:h.color,lineHeight:1}}>{h.episodes}</div>

              </div>
            </div>
            <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid #141820"}}>

              <div style={{fontSize:13,color:"#9aa0b8",marginBottom:10}}>{h.style}</div>
              <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                {h.shows.map(s=><span key={s} style={css.tag(h.color)}>{s}</span>)}
              </div>
            </div>
          </div>
        ))}
      </div>

      {/* Schedule */}
      <div style={css.card}>
        <div style={{fontWeight:700,color:"#fff",fontSize:15,marginBottom:16}}>📅 Weekly Broadcast Schedule</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10}}>
          {["MON","TUE","WED","THU","FRI"].map((day,i)=>(
            <div key={day} style={{background:"#080b12",borderRadius:12,padding:12}}>
              <div style={{fontSize:10,fontWeight:700,color:"#8891a8",letterSpacing:2,marginBottom:10}}>{day}</div>
              {[HOSTS[i%4],HOSTS[(i+2)%4]].map(h=>(
                <div key={h.name} style={{display:"flex",alignItems:"center",gap:7,marginBottom:7,padding:"6px 8px",background:`${h.color}0e`,borderRadius:8,borderLeft:`3px solid ${h.color}`}}>
                  <span style={{fontSize:14}}>{h.emoji}</span>
                  <span style={{fontSize:11,color:"#b8c0d0",fontWeight:500,lineHeight:1.2}}>{h.name.split(" ")[0]}</span>
                </div>
              ))}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── ROOT APP ──────────────────────────────────────────────────────────────────
function App(){
  const [authed,setAuthed]=useState(false);
  const [tab,setTab]=useState("dashboard");

  const nav=[
    {id:"dashboard",label:"Dashboard",  icon:"📊"},
    {id:"tools",    label:"AI Tools",   icon:"⚡"},
    {id:"studio",   label:"News Studio",icon:"📺"},
    {id:"affiliates",label:"Affiliates",icon:"💰"},
    {id:"team",     label:"Team HQ",    icon:"👥"},
  ];

  if(!authed)return <Gate onAuth={()=>setAuthed(true)}/>;

  return (
    <div style={{minHeight:"100vh",background:"#06070d",display:"flex"}}>
      {/* Sidebar */}
      <aside style={{width:214,background:"#080b12",borderRight:"1px solid #141820",display:"flex",flexDirection:"column",position:"fixed",top:0,left:0,height:"100vh",zIndex:100}}>
        {/* Logo */}
        <div style={{padding:"22px 18px 18px",borderBottom:"1px solid #141820"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:38,height:38,borderRadius:11,background:"linear-gradient(135deg,#f0a500,#c06000)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,animation:"glow 3s infinite",flexShrink:0}}>⚡</div>
            <div>
              <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:15,fontWeight:900,color:"#fff",letterSpacing:-.5}}>HUB ENGINE</div>
              <div style={{fontSize:9,color:"#f0a500",fontWeight:700,letterSpacing:4}}>V 4 . 0</div>
            </div>
          </div>
        </div>

        {/* Nav */}
        <nav style={{flex:1,padding:"14px 10px"}}>
          {nav.map(n=>{
            const on=tab===n.id;
            return (
              <button key={n.id} onClick={()=>setTab(n.id)}
                style={{display:"flex",alignItems:"center",gap:11,width:"100%",padding:"10px 12px",borderRadius:10,marginBottom:3,border:"none",background:on?"rgba(240,165,0,.11)":"transparent",color:on?"#f0a500":"#8891a8",cursor:"pointer",fontSize:13,fontWeight:on?600:400,transition:"all .18s",textAlign:"left"}}
                onMouseEnter={e=>{if(!on){e.currentTarget.style.background="rgba(255,255,255,0.05)";e.currentTarget.style.color="#c8d0e0";}}}
                onMouseLeave={e=>{if(!on){e.currentTarget.style.background="transparent";e.currentTarget.style.color="#8891a8";}}}
              >
                <span style={{fontSize:16}}>{n.icon}</span>
                {n.label}
                {on&&<span style={{marginLeft:"auto",width:6,height:6,borderRadius:"50%",background:"#f0a500",display:"inline-block"}}/>}
              </button>
            );
          })}
        </nav>

        {/* Footer */}
        <div style={{padding:"14px 10px",borderTop:"1px solid #141820"}}>
          <div style={{fontSize:10,color:"#3a4156",textAlign:"center",lineHeight:1.6,marginBottom:10}}>Three Minds · One Mission<br/>Zero Cost · Orange, TX</div>
          <button onClick={()=>setAuthed(false)} style={{...css.ghost,width:"100%",justifyContent:"center",fontSize:12,padding:"9px"}}>
            🔒 Lock Hub
          </button>
        </div>
      </aside>

      {/* Main */}
      <main style={{marginLeft:214,flex:1,padding:"32px 36px",minHeight:"100vh"}}>
        <div style={{maxWidth:980}}>
          {tab==="dashboard"  &&<Dashboard setTab={setTab}/>}
          {tab==="tools"      &&<AITools/>}
          {tab==="studio"     &&<Studio/>}
          {tab==="affiliates" &&<Affiliates/>}
          {tab==="team"       &&<Team/>}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
