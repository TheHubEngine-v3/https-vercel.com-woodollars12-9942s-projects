<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>The Hub Engine v3</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet"/>
<style>
:root{--gold:#f5c518;--gold2:#e8a020;--dark:#07070f;--dark2:#0e0e1a;--dark3:#13131f;--border:rgba(245,197,24,0.18);--text:#eeeef5;--muted:rgba(238,238,245,0.45);--green:#0f9d58;--red:#ea4335;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--dark);color:var(--text);font-family:'Exo 2',sans-serif;}

#loginScreen{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:24px;}
.login-glow{width:90px;height:90px;border-radius:50%;background:radial-gradient(circle,rgba(245,197,24,0.25),transparent 70%);display:flex;align-items:center;justify-content:center;font-size:42px;margin-bottom:20px;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(245,197,24,0.3);}50%{box-shadow:0 0 0 20px rgba(245,197,24,0);}}
.login-title{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:var(--gold);letter-spacing:3px;text-align:center;}
.login-sub{font-size:11px;color:var(--muted);letter-spacing:2px;margin-bottom:32px;}
.login-step{width:100%;max-width:360px;margin-bottom:14px;}
.login-label{font-size:10px;color:var(--gold);letter-spacing:2px;font-weight:700;margin-bottom:6px;}
.login-input{width:100%;padding:13px 16px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;outline:none;font-family:'Exo 2',sans-serif;}
.login-input:focus{border-color:var(--gold);}
.login-btn{width:100%;max-width:360px;padding:15px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;letter-spacing:2px;border:none;border-radius:10px;cursor:pointer;margin-top:8px;}
.login-err{font-size:12px;color:var(--red);text-align:center;margin-top:8px;min-height:18px;}

#app{display:flex;flex-direction:column;height:100%;height:100dvh;overflow:hidden;}
.status-bar{background:rgba(15,157,88,0.12);border-bottom:1px solid rgba(15,157,88,0.25);padding:6px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.status-text{font-size:10px;color:var(--green);letter-spacing:2px;font-weight:700;font-family:'Rajdhani',sans-serif;}
.status-right{margin-left:auto;font-size:10px;color:var(--muted);letter-spacing:1px;}

.pages{flex:1;overflow:hidden;}
.page{display:none;height:100%;flex-direction:column;overflow:hidden;}
.page.active{display:flex;}

.chat-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden;}
.chat-header{padding:12px 16px;background:var(--dark2);border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:10px;}
.chat-header-icon{font-size:28px;}
.chat-header-content{flex:1;}
.chat-header-title{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;color:var(--gold);letter-spacing:1px;}
.chat-header-sub{font-size:11px;color:var(--muted);}

.voice-controls{display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0;}
.voice-select{padding:6px 10px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:11px;outline:none;cursor:pointer;max-width:140px;}
.voice-btn{width:40px;height:40px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,0.05);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.voice-btn:active{background:rgba(245,197,24,0.2);border-color:var(--gold);color:var(--gold);}

.messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.msg{max-width:85%;padding:11px 14px;border-radius:14px;font-size:14px;line-height:1.55;}
.msg.bot{background:rgba(255,255,255,0.06);border:1px solid var(--border);align-self:flex-start;border-radius:4px 14px 14px 14px;}
.msg.user{background:rgba(245,197,24,0.12);border:1px solid rgba(245,197,24,0.2);align-self:flex-end;border-radius:14px 4px 14px 14px;color:var(--gold);}

.chat-input-bar{display:flex;align-items:flex-end;gap:8px;padding:10px 12px;background:var(--dark2);border-top:1px solid var(--border);flex-shrink:0;min-height:62px;}
.chat-input-bar textarea{flex:1;padding:10px 14px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;resize:none;min-height:40px;max-height:100px;font-family:'Exo 2',sans-serif;}
.chat-input-bar textarea:focus{border-color:var(--gold);}
.icon-btn{width:40px;height:40px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,0.05);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.icon-btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border:none;font-weight:700;}
.icon-btn:active{opacity:0.8;}

.page-inner{flex:1;overflow-y:auto;padding:16px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.page-inner::-webkit-scrollbar{width:4px;}
.page-inner::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.card{background:var(--dark3);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
.card-title{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.grid-4{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}

.link-btn{padding:11px 10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;color:var(--text);font-size:12px;cursor:pointer;text-align:center;transition:all .2s;text-decoration:none;display:block;}
.link-btn:active{background:rgba(245,197,24,0.08);border-color:var(--border);}
.link-btn .icon{font-size:20px;display:block;margin-bottom:4px;}
.link-btn .name{font-size:11px;font-weight:600;}
.link-btn .sub{font-size:10px;color:var(--muted);margin-top:2px;}

.actor-card{padding:14px;background:var(--dark3);border:2px solid rgba(255,255,255,0.06);border-radius:12px;cursor:pointer;transition:all .2s;text-align:center;}
.actor-card.selected{border-color:var(--gold);background:rgba(245,197,24,0.06);}
.actor-card .icon{font-size:32px;margin-bottom:6px;}
.actor-card .name{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--gold);}
.actor-card .day{font-size:10px;color:var(--muted);letter-spacing:1px;}

.chip{display:inline-block;padding:7px 13px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:20px;font-size:12px;color:var(--muted);cursor:pointer;margin:0 5px 5px 0;transition:all .2s;}
.chip.selected{background:rgba(245,197,24,0.1);border-color:var(--gold);color:var(--gold);}

.set-row{margin-bottom:14px;}
.set-label{font-size:10px;color:var(--gold);letter-spacing:2px;font-weight:700;margin-bottom:6px;}
.set-input{width:100%;padding:11px 14px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;outline:none;font-family:'Exo 2',sans-serif;}
.set-input:focus{border-color:var(--gold);}
.set-status{padding:10px 14px;border-radius:10px;font-size:12px;margin-bottom:10px;}
.set-ok{background:rgba(15,157,88,0.1);border:1px solid rgba(15,157,88,0.3);color:var(--green);}
.set-err{background:rgba(234,67,53,0.1);border:1px solid rgba(234,67,53,0.3);color:var(--red);}

.btn{width:100%;padding:13px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:'Rajdhani',sans-serif;letter-spacing:1px;margin-bottom:8px;transition:all .2s;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;}
.btn-gray{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(--muted);font-size:12px;}
.btn-green{background:rgba(15,157,88,0.12);border:1px solid rgba(15,157,88,0.3);color:var(--green);}

.script-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:13px;line-height:1.6;color:var(--muted);min-height:100px;white-space:pre-wrap;margin-bottom:10px;max-height:300px;overflow-y:auto;}

.scene-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.scene-item{background:rgba(255,255,255,0.03);border-left:3px solid rgba(245,197,24,0.2);border-radius:0 8px 8px 0;padding:8px 12px;font-size:12px;color:var(--muted);display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.scene-item.current{border-left-color:var(--gold);color:var(--text);background:rgba(245,197,24,0.04);}
.scene-copy{background:rgba(245,197,24,0.1);border:1px solid rgba(245,197,24,0.2);border-radius:6px;padding:3px 8px;font-size:10px;color:var(--gold);cursor:pointer;white-space:nowrap;flex-shrink:0;font-weight:700;}

.log-entry{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;margin-bottom:7px;}
.log-cb{width:18px;height:18px;accent-color:var(--gold);cursor:pointer;flex-shrink:0;}
.log-text{flex:1;font-size:13px;color:var(--text);}
.log-del{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:2px 6px;}

.tab-bar{display:flex;overflow-x:auto;flex-shrink:0;background:var(--dark2);border-top:2px solid var(--border);scrollbar-width:none;padding-bottom:env(safe-area-inset-bottom);min-height:60px;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 11px;gap:3px;flex-shrink:0;cursor:pointer;border-top:2px solid transparent;transition:all .2s;min-width:50px;font-family:'Rajdhani',sans-serif;}
.tab-btn span:first-child{font-size:18px;}
.tab-btn span:last-child{font-size:8px;letter-spacing:1px;color:var(--muted);font-weight:700;}
.tab-btn.active{border-top-color:var(--gold);}
.tab-btn.active span:last-child{color:var(--gold);}

.section-title{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin:16px 0 8px;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(15,157,88,0.9);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:700;z-index:9998;pointer-events:none;opacity:0;transition:opacity .3s;}
.toast.show{opacity:1;}

.quick-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.qchip{padding:6px 11px;background:rgba(245,197,24,0.08);border:1px solid rgba(245,197,24,0.2);border-radius:16px;font-size:11px;color:var(--gold);cursor:pointer;}

.email-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px;font-size:12px;}
.email-subject{color:var(--gold);font-weight:700;margin-bottom:8px;word-break:break-word;}
.email-body{color:var(--muted);line-height:1.6;white-space:pre-wrap;word-break:break-word;}

@media screen and (max-width:480px){
  .grid-2{grid-template-columns:1fr;}
  .icon-btn{width:44px;height:44px;}
  .voice-select{max-width:100px;font-size:10px;}
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-glow">🤖</div>
  <div class="login-title">THE HUB ENGINE v3</div>
  <div class="login-sub">AFFILIATEMEDIAHUB STUDIO</div>
  <div id="loginStep1" class="login-step">
    <div class="login-label">GROQ API KEY</div>
    <input id="apiInput" class="login-input" type="password" placeholder="gsk_..." autocomplete="off"/>
  </div>
  <div class="login-step">
    <div class="login-label">ACCESS PASSWORD</div>
    <input id="pwInput" class="login-input" type="password" placeholder="••••••••" autocomplete="off"/>
  </div>
  <button class="login-btn" onclick="doLogin()">🚀 ENTER THE HUB</button>
  <div class="login-err" id="loginErr"></div>
  <div style="font-size:10px;color:rgba(238,238,245,0.2);margin-top:20px;text-align:center;letter-spacing:1px;">JOHN LANTER · CEO · ORANGE TEXAS<br/>THREE MINDS · ONE MISSION · ZERO COST</div>
</div>

<div id="app">
  <div class="status-bar">
    <div class="status-dot"></div>
    <div class="status-text">ALL CONNECTIONS LIVE</div>
    <div class="status-right">HUB ENGINE v3</div>
  </div>

  <div class="pages" id="pages"></div>

  <div class="tab-bar" id="tabBar"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const PW = 'JohnHub2025';
let groqKey = '';
let elevenLabsKey = '';
let recognition = null;
let speaking = true;
let chosenVoiceId = 'US English Female';
const msgHistory = {};
let logEntries = [];

let selectedActor = '';
let selectedTopic = '';
let selectedLen = '120';
let scenePrompts = [];
let currentScene = 0;

let selectedBizActor = '';
let bizName = '';
let bizScenePrompts = [];
let currentBizScene = 0;

let selectedAffActor = '';
let selectedAffProd = '';
let affScenePrompts = [];
let currentAffScene = 0;

let selectedFunnelProd = '';

const TABS = [
  {id:'home',icon:'🏠',name:'HOME',type:'chat'},
  {id:'becky',icon:'🎙️',name:'BECKY',type:'chat-voice'},
  {id:'jobs',icon:'💼',name:'JOBS',type:'chat'},
  {id:'actors',icon:'🎭',name:'ACTORS',type:'tool'},
  {id:'studio',icon:'🎬',name:'STUDIO',type:'chat'},
  {id:'business',icon:'🏢',name:'BIZ',type:'tool'},
  {id:'affvideo',icon:'💰',name:'AFF',type:'tool'},
  {id:'funnel',icon:'💌',name:'FUNNEL',type:'tool'},
  {id:'social',icon:'📱',name:'SOCIAL',type:'chat'},
  {id:'aitools',icon:'🤖',name:'AI',type:'chat'},
  {id:'learn',icon:'📚',name:'LEARN',type:'chat'},
  {id:'affiliate',icon:'🔗',name:'AFF',type:'chat'},
  {id:'log',icon:'✅',name:'LOG',type:'tool'},
  {id:'settings',icon:'⚙️',name:'SET',type:'tool'}
];

const SYSTEMS = {
  home: 'You are The Hub Engine AI assistant. Be warm, helpful, brief.',
  becky: 'You are Becky, John\'s Creative Director and best friend. John is 59 from Orange TX, learning AI while caring for his elderly sister-in-law. Be warm, supportive.',
  jobs: 'You are a career coach. Help John with job search, resume, interviews. He\'s 59, former plant operator 20+ years.',
  studio: 'You are a professional video script writer. Help John write scripts.',
  social: 'You are a social media expert. Help John create posts, captions, hashtags.',
  aitools: 'You are an AI tools expert. Help John understand and use AI tools.',
  learn: 'You are a patient learning coach. Help John learn AI, prompt engineering. Keep simple and encouraging.',
  affiliate: 'You are an affiliate marketing expert. Help John with marketing strategies.'
};

const GREETINGS = {
  home: 'Welcome back John! 🏠 The Hub Engine is ready. What can I help?',
  becky: 'Hello John, how is your day going?',
  jobs: 'Hi John! Ready to work on your job search.',
  studio: 'Hey John! Ready to write scripts.',
  social: 'Hi John! Let\'s create great social content.',
  aitools: 'Hi John! Ask me about any AI tool.',
  learn: 'Hello John! Ready to learn something new.',
  affiliate: 'Hi John! Let\'s work on affiliate marketing.'
};

function doLogin(){
  const apiVal = document.getElementById('apiInput').value.trim();
  const pwVal = document.getElementById('pwInput').value.trim();
  const err = document.getElementById('loginErr');
  if(!apiVal){ err.textContent = 'Please enter your Groq API key'; return; }
  if(pwVal !== PW){ err.textContent = 'Incorrect password'; return; }
  groqKey = apiVal.replace(/[^\x20-\x7E]/g,'').trim();
  if(!groqKey.startsWith('gsk_')){ err.textContent = 'API key must start with gsk_'; return; }
  localStorage.setItem('hub_groq', groqKey);
  localStorage.setItem('hub_auth', '1');
  launchApp();
}

function launchApp(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  buildUI();
  loadSettings();
  loadVoices();
  loadLog();
  initGreetings();
}

function buildUI(){
  const pagesDiv = document.getElementById('pages');
  const tabBar = document.getElementById('tabBar');
  pagesDiv.innerHTML = '';
  tabBar.innerHTML = '';

  TABS.forEach((tab,idx) => {
    const page = createPage(tab);
    pagesDiv.appendChild(page);
    if(idx === 0) page.classList.add('active');

    const btn = document.createElement('div');
    btn.className = 'tab-btn'+(idx===0?' active':'');
    btn.innerHTML = `<span>${tab.icon}</span><span>${tab.name}</span>`;
    btn.onclick = () => showTab(tab.id);
    tabBar.appendChild(btn);
  });
}

function createPage(tab){
  const page = document.createElement('div');
  page.className = 'page';
  page.id = 'page-' + tab.id;

  if(tab.type === 'chat' || tab.type === 'chat-voice'){
    page.classList.add('chat-wrap');
    const header = document.createElement('div');
    header.className = 'chat-header';
    header.innerHTML = `<div class="chat-header-icon">${tab.icon}</div><div class="chat-header-content"><div class="chat-header-title">${tab.id.toUpperCase()}</div></div>`;
    
    if(tab.type === 'chat-voice'){
      const voiceCtrl = document.createElement('div');
      voiceCtrl.className = 'voice-controls';
      voiceCtrl.innerHTML = `
        <select class="voice-select" id="voiceSelect" onchange="saveVoice()">
          <option value="US English Female">🇬🇧 British</option>
          <option value="Australian Female">🇦🇺 Australian</option>
          <option value="US English Female">🇺🇸 American</option>
        </select>
        <button class="voice-btn" onclick="testVoice()" title="Test voice">🔈</button>
        <button class="voice-btn" onclick="toggleSpeak()" id="speakBtn" title="Toggle voice">🔊</button>
      `;
      header.appendChild(voiceCtrl);
    }
    page.appendChild(header);

    const messages = document.createElement('div');
    messages.className = 'messages';
    messages.id = 'msgs-' + tab.id;
    page.appendChild(messages);

    const inputBar = document.createElement('div');
    inputBar.className = 'chat-input-bar';
    inputBar.innerHTML = `
      <textarea id="inp-${tab.id}" placeholder="Type here..." rows="1" onkeydown="handleKey(event,'${tab.id}')"></textarea>
      <button class="icon-btn" onclick="toggleMic('${tab.id}')" id="mic-${tab.id}">🎤</button>
      <button class="icon-btn gold" onclick="sendMsg('${tab.id}')">➤</button>
    `;
    page.appendChild(inputBar);
  } else {
    const inner = document.createElement('div');
    inner.className = 'page-inner';
    inner.id = 'inner-' + tab.id;
    page.appendChild(inner);

    if(tab.id === 'actors') buildActorsPage(inner);
    else if(tab.id === 'business') buildBusinessPage(inner);
    else if(tab.id === 'affvideo') buildAffVideoPage(inner);
    else if(tab.id === 'funnel') buildFunnelPage(inner);
    else if(tab.id === 'log') buildLogPage(inner);
    else if(tab.id === 'settings') buildSettingsPage(inner);
  }

  return page;
}

function buildActorsPage(inner){
  inner.innerHTML = `
    <div class="card">
      <div class="card-title">🎭 PICK YOUR ACTOR</div>
      <div class="grid-4">
        <div class="actor-card" id="ac-lisa" onclick="selectActorTab('lisa')"><div class="icon">🔴</div><div class="name">LISA</div><div class="day">FRI</div></div>
        <div class="actor-card" id="ac-alisha" onclick="selectActorTab('alisha')"><div class="icon">🔵</div><div class="name">ALISHA</div><div class="day">WED</div></div>
        <div class="actor-card" id="ac-susan" onclick="selectActorTab('susan')"><div class="icon">🩵</div><div class="name">SUSAN</div><div class="day">MON</div></div>
        <div class="actor-card" id="ac-paul" onclick="selectActorTab('paul')"><div class="icon">🎙️</div><div class="name">PAUL</div><div class="day">THU</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">🎯 TOPIC</div>
      <div><span class="chip" id="tp-ainews" onclick="selectTopicTab('ainews')">🤖 AI News</span><span class="chip" id="tp-affiliate" onclick="selectTopicTab('affiliate')">💰 Affiliate</span><span class="chip" id="tp-tips" onclick="selectTopicTab('tips')">💡 Tips</span><span class="chip" id="tp-custom" onclick="selectTopicTab('custom')">✏️ Custom</span></div>
      <input id="customTopicInput" class="set-input" placeholder="Enter topic..." style="display:none;margin-top:10px;"/>
    </div>

function addBotMsg(tab, text){
  const box = document.getElementById('msgs-' + tab);

  const d = document.createElement('div');
  d.className = 'msg bot';
  d.textContent = text;
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
}

function addUserMsg(tab, text){
  const box = document.getElementById('msgs-' + tab);
  if(!box) return;
  const d = document.createElement('div');
  d.className = 'msg user';
  d.textContent = text;
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
}

async function sendMsg(tab){
  const inp = document.getElementById('inp-' + tab);
  const text = inp.value.trim();
  if(!text) return;
  inp.value = '';
  inp.style.height = 'auto';
  if(!groqKey){ addBotMsg(tab,'⚠️ No API key. Go to ⚙️ Settings.'); return; }
  addUserMsg(tab, text);
  if(!msgHistory[tab]) msgHistory[tab] = [];
  msgHistory[tab].push({role:'user',content:text});

  try{
    const messages = [{role:'system',content:SYSTEMS[tab]||SYSTEMS.home},...msgHistory[tab].slice(-8)];
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+groqKey},
      body:JSON.stringify({model:'llama-3.3-70b-versatile',messages,max_tokens:600,temperature:0.8})
    });
    const data = await res.json();
    if(data.error){ addBotMsg(tab,'❌ '+data.error.message); return; }
    const reply = data.choices[0].message.content;
    msgHistory[tab].push({role:'assistant',content:reply});
    addBotMsg(tab, reply);
    if(tab === 'becky' && speaking && elevenLabsKey) speakText(reply);
  } catch(e){
    addBotMsg(tab,'❌ Connection error');
  }
}

function handleKey(e, tab){
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMsg(tab); }
  const t = e.target;
  t.style.height = 'auto';
  t.style.height = Math.min(t.scrollHeight, 100) + 'px';
}

function toggleMic(tab){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){ showToast('Speech not supported'); return; }
  const btn = document.getElementById('mic-' + tab);
  if(recognition){ recognition.stop(); recognition = null; btn.textContent = '🎤'; return; }
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.onresult = e => {
    document.getElementById('inp-' + tab).value = e.results[0][0].transcript;
    btn.textContent = '🎤';
    recognition = null;
  };
  recognition.onerror = () => { btn.textContent = '🎤'; recognition = null; };
  recognition.onend = () => { btn.textContent = '🎤'; recognition = null; };
  recognition.start();
  btn.textContent = '🔴';
}

function speakText(text){
  if(!speaking || !elevenLabsKey) return;
  const clean = text.replace(/[\u{1F300}-\u{1FAD6}]/gu,'').replace(/[^\w\s.,!?':-]/g,' ').trim().substring(0, 400);
  if(!clean) return;
  speakWithElevenLabs(clean);
}

function speakWithElevenLabs(text){
  const voiceId = 'EXAVITQu4vr4xnSDxMaL';
  const url = `https://api.elevenlabs.io/v1/text-to-speech/${voiceId}/stream`;
  
  fetch(url, {
    method: 'POST',
    headers: {'xi-api-key': elevenLabsKey, 'Content-Type': 'application/json'},
    body: JSON.stringify({text, model_id: 'eleven_monolingual_v1', voice_settings: {stability: 0.5, similarity_boost: 0.75}})
  })
  .then(r => {if(!r.ok) throw new Error('ElevenLabs error'); return r.blob();})
  .then(blob => {const audio = new Audio(); audio.src = URL.createObjectURL(blob); audio.play().catch(e => console.error('Play error:', e));})
  .catch(e => console.error('ElevenLabs error:', e));
}

async function generateActorScript(){
  if(!groqKey || !selectedActor || !selectedTopic){ showToast('Fill all fields!'); return; }
  const customVal = document.getElementById('customTopicInput').value.trim();
  const topicNames = {ainews:'AI news',affiliate:'affiliate product',tips:'AI tips',custom:customVal||'topic'};
  const lenSec = parseInt(selectedLen);
  const numScenes = Math.max(3, Math.round(lenSec / 6));
  const actorName = {lisa:'Lisa',alisha:'Alisha',susan:'Susan',paul:'Paul'}[selectedActor];
  const prompt = `Write a ${lenSec}-second script for ${actorName} about ${topicNames[selectedTopic]}. Break into ${numScenes} scenes. Format: SCRIPT: [script] SCENES: [list scenes]`;
  
  try{
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+groqKey},
      body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'user',content:prompt}],max_tokens:2000,temperature:0.8})
    });
    const data = await res.json();
    if(data.error){ showToast('Error: '+data.error.message); return; }
    const reply = data.choices[0].message.content;
    const scriptMatch = reply.match(/SCRIPT:\s*([\s\S]*?)(?=SCENES:|$)/i);
    const scenesMatch = reply.match(/SCENES:\s*([\s\S]*)/i);
    document.getElementById('actorScript').textContent = scriptMatch ? scriptMatch[1].trim() : '(See scenes)';
    scenePrompts = [];
    if(scenesMatch){
      scenesMatch[1].split('\n').forEach(l => {
        const m = l.match(/Scene\s*\d+[:\-]\s*(.*)/i);
        if(m && m[1].trim()) scenePrompts.push(m[1].trim());
      });
    }
    currentScene = 0;
    const list = document.getElementById('sceneList');
    list.innerHTML = '';
    scenePrompts.forEach((p, i) => {
      const d = document.createElement('div');
      d.className = 'scene-item';
      const txt = document.createElement('span');
      txt.textContent = 'Scene ' + (i+1) + ': ' + p.substring(0, 80) + (p.length > 80 ? '...' : '');
      const btn = document.createElement('button');
      btn.className = 'scene-copy';
      btn.textContent = '📋';
      btn.onclick = () => { navigator.clipboard.writeText(p); showToast('Copied!'); };
      d.appendChild(txt);
      d.appendChild(btn);
      list.appendChild(d);
    });
    document.getElementById('actorScriptArea').style.display = 'block';
    showToast('✅ ' + scenePrompts.length + ' scenes ready!');
  } catch(e){
    showToast('Connection error');
  }
}

    if(!prodName){ showToast('Enter product!'); return; }
  }
  const prompt = `Write 3 email marketing emails to promote "${prodName}". Format: EMAIL1_SUBJECT: [subject] EMAIL1_BODY: [body] EMAIL2_SUBJECT: [subject] EMAIL2_BODY: [body] EMAIL3_SUBJECT: [subject] EMAIL3_BODY: [body]`;
  
  try{
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+groqKey},
      body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'user',content:prompt}],max_tokens:1500,temperature:0.8})
    });
    const data = await res.json();
    if(data.error){ showToast('Error'); return; }
    const reply = data.choices[0].message.content;
    const getSection = (tag) => {const m = reply.match(new RegExp(tag + '_BODY:\\s*([\\s\\S]*?)(?=EMAIL\\d|$)', 'i')); return m ? m[1].trim() : '';};
    const getSubject = (tag) => {const m = reply.match(new RegExp(tag + '_SUBJECT:\\s*(.+)', 'i')); return m ? m[1].trim() : '';};
    for(let i = 1; i <= 3; i++){
      document.getElementById('e' + i + 'sub').textContent = getSubject('EMAIL' + i);
      document.getElementById('e' + i + 'body').textContent = getSection('EMAIL' + i);
    }
    document.getElementById('funnelArea').style.display = 'block';
    showToast('✅ 3 emails generated!');
  } catch(e){
    showToast('Error');
  }
}

function copyEmail(num){ const subj = document.getElementById('e' + num + 'sub').textContent; const body = document.getElementById('e' + num + 'body').textContent; navigator.clipboard.writeText('Subject: ' + subj + '\n\n' + body); showToast('Copied!'); }

function loadLog(){
  const saved = localStorage.getItem('hub_log');
  logEntries = saved ? JSON.parse(saved) : [];
  renderLog();
}

function saveLog(){ localStorage.setItem('hub_log', JSON.stringify(logEntries)); }

function renderLog(){
  const list = document.getElementById('logList');
  if(!list) return;
  list.innerHTML = '';
  if(logEntries.length === 0){
    list.innerHTML = '<div style="font-size:12px;color:var(--muted);text-align:center;padding:20px;">Start logging your wins! 💪</div>';
    return;
  }
  logEntries.forEach((e, i) => {
    const d = document.createElement('div');
    d.className = 'log-entry';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.className = 'log-cb';
    cb.checked = e.done;
    cb.onchange = () => { logEntries[i].done = cb.checked; saveLog(); renderLog(); };
    const span = document.createElement('div');
    span.className = 'log-text';
    span.textContent = e.text;
    if(e.done) span.style.textDecoration = 'line-through';
    const del = document.createElement('button');
    del.className = 'log-del';
    del.textContent = '✕';
    del.onclick = () => { logEntries.splice(i, 1); saveLog(); renderLog(); };
    d.appendChild(cb);
    d.appendChild(span);
    d.appendChild(del);
    list.appendChild(d);
  });
}

function addLogEntry(){
  const inp = document.getElementById('logInput');
  const text = inp.value.trim();
  if(!text) return;
  logEntries.unshift({text, done:false});
  saveLog();
  renderLog();
  inp.value = '';
  showToast('✅ Logged!');
}

function addQuick(text){
  logEntries.unshift({text, done:false});
  saveLog();
  renderLog();
  showToast('✅ Logged!');
}

function loadSettings(){
  const savedGroq = localStorage.getItem('hub_groq');
  const savedEL = localStorage.getItem('hub_elevenlabs');
  const stat = document.getElementById('setStatus');
  if(savedGroq) groqKey = savedGroq.replace(/[^\x20-\x7E]/g,'').trim();
  if(savedEL) elevenLabsKey = savedEL.replace(/[^\x20-\x7E]/g,'').trim();
  if(stat){
    if(groqKey && elevenLabsKey){
      stat.className = 'set-status set-ok';
      stat.textContent = '🔒 Both Keys Active';
    } else if(groqKey || elevenLabsKey){
      stat.className = 'set-status set-ok';
      stat.textContent = '🔒 Partial Setup';
    } else {
      stat.className = 'set-status set-err';
      stat.textContent = '⚠️ No keys saved';
    }
  }
}

function saveApiKeys(){
  const inpGroq = document.getElementById('setApiKey');
  const inpEL = document.getElementById('setElevenLabsKey');
  const groqVal = inpGroq.value.trim().replace(/[^\x20-\x7E]/g,'');
  const elVal = inpEL.value.trim().replace(/[^\x20-\x7E]/g,'');
  if(!groqVal && !elVal){ showToast('Enter at least one key'); return; }
  if(groqVal && !groqVal.startsWith('gsk_')){ showToast('Groq key must start with gsk_'); return; }
  if(elVal && !elVal.startsWith('sk_')){ showToast('ElevenLabs key must start with sk_'); return; }
  if(groqVal){ groqKey = groqVal; localStorage.setItem('hub_groq', groqVal); }
  if(elVal){ elevenLabsKey = elVal; localStorage.setItem('hub_elevenlabs', elVal); }
  inpGroq.value = '';
  inpEL.value = '';
  const stat = document.getElementById('setStatus');
  if(stat){
    stat.className = 'set-status set-ok';
    stat.textContent = '🔒 Both Keys Active';
  }
  showToast('✅ Keys saved!');
}

function clearApiKeys(){
  localStorage.removeItem('hub_groq');
  localStorage.removeItem('hub_elevenlabs');
  groqKey = '';
  elevenLabsKey = '';
  document.getElementById('setApiKey').value = '';
  document.getElementById('setElevenLabsKey').value = '';
  const stat = document.getElementById('setStatus');
  if(stat){
    stat.className = 'set-status set-err';
    stat.textContent = '⚠️ No keys saved';
  }
  showToast('Keys cleared');
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

window.onload = function(){
  const savedKey = localStorage.getItem('hub_groq');
  const savedEL = localStorage.getItem('hub_elevenlabs');
  if(savedKey){
    groqKey = savedKey.replace(/[^\x20-\x7E]/g,'').trim();
    const step1 = document.getElementById('loginStep1');
    if(step1) step1.style.display = 'none';
    const apiInp = document.getElementById('apiInput');
    if(apiInp) apiInp.value = groqKey;
  }
  if(savedEL){
    elevenLabsKey = savedEL.replace(/[^\x20-\x7E]/g,'').trim();
  }
};
</script>
