  {id:"video",emoji:"🎬",title:"How To Make Videos",color:"#f0a500",lessons:[
    {title:"What Is AI Video Generation?",body:"AI video generation means using software to create videos automatically from text. Tools like InVideo AI and Vidnoz let you TYPE a script and the AI creates a complete video with visuals, music, and voiceover. No camera or editing skills needed.\n\nYOUR TWO MAIN TOOLS:\n1. InVideo AI - best for news-style and social content (30% commission)\n2. Vidnoz - best for avatar-based videos with your anchors (50% commission)\n\nBASIC WORKFLOW:\nWrite script in Hub Engine V4, paste it into Vidnoz, pick an avatar, hit generate, download your video. That is the entire process."},

    {title:"Your Video Production Checklist",body:"Before publishing ANY video:\n\nSCRIPT:\n[ ] Strong hook in first 3 seconds?\n[ ] Message focused on ONE topic?\n[ ] Clear call to action at the end?\n[ ] Right length for the platform?\n\nVIDEO:\n[ ] Visuals relevant to the topic?\n[ ] Audio clear?\n[ ] Captions added?\n[ ] Looks good on mobile?\n\nPOSTING:\n[ ] Platform-specific caption written?\n[ ] 3-tier hashtags added?\n[ ] Affiliate link in description?\n[ ] Added to Content Calendar?\n\nIF ALL CHECKED - hit publish!"}

  {id:"prompt",emoji:"⚡",title:"Prompt Engineering 101",color:"#a78bfa",lessons:[
    {title:"What Is A Prompt - Plain English",body:"A PROMPT is simply the instruction you give to an AI.\n\nBAD PROMPT: Write a script\n\nGOOD PROMPT: Write a 45-second news script for Lisa, my professional English Asian anchor, about AI replacing warehouse jobs. Tone: urgent and authoritative. Strong hook in first 3 seconds. End with a call to action to visit our website.\n\nThe good prompt tells the AI:\n- WHO is delivering it (Lisa)\n- WHAT the topic is\n- HOW LONG (45 seconds)\n- WHAT TONE (urgent, authoritative)\n- WHAT STRUCTURE (hook + CTA)\n\nTHAT IS ALL PROMPT ENGINEERING IS. Being specific and clear."},
    {title:"The 5-Part Prompt Formula",body:"Remember as RTFCS:\n\n1. ROLE - Tell the AI who to be\nExample: You are a professional TV news writer\n\n2. TASK - Tell it exactly what to do\nExample: Write a 45-second anchor script\n\n3. FORMAT - Tell it how to structure the output\nExample: Divide into HOOK, BODY, CTA with time markers\n\n4. CONSTRAINTS - Give it limits\nExample: Under 100 words. No jargon.\n\n5. STYLE - Tell it the tone\nExample: Urgent and authoritative like CNN Breaking News\n\nFULL EXAMPLE:\nYou are a professional TV news writer. Write a 45-second anchor script about AI replacing warehouse jobs. Divide into HOOK, BODY, CTA with time markers. Under 100 words, no jargon. Tone: urgent and authoritative like CNN Breaking News.\n\nTHAT is a world-class prompt."},
    {title:"10 Real Prompts You Can Use Today",body:"Copy and use these in AI Tools:\n\n1. SCRIPT: Write a 60-second video script for Lisa about [TOPIC]. Hook in first 3 seconds. Professional news anchor tone. End with call to action.\n\n2. AFFILIATE: Write 3 social captions promoting Vidnoz AI. Focus on: saves 5 hours of editing per week. CTA included. Audience: small business owners.\n\n3. EMAIL: Write a 3-email welcome sequence for someone who just signed up for InVideo AI through my affiliate link. Friendly helpful tone. Each email under 200 words.\n\n4. TITLE: Write 5 YouTube titles for a video about AI replacing customer service jobs. Click-worthy but not clickbait. Audience: business owners over 40.\n\n5. FUNNEL: Write landing page copy for Vidnoz AI targeting local business owners in Southeast Texas who want weekly promo videos but have no video skills."},
    {title:"How To Give Better Instructions",body:"THREE GOLDEN RULES:\n\nRULE 1 - BE SPECIFIC\nDo not say: Make it better\nDo say: Make the hook more urgent and add a statistic in the first sentence\n\nRULE 2 - GIVE EXAMPLES\nDo not say: Write it like a news anchor\nDo say: Write it like CNN Breaking News - short sentences, high urgency, facts first\n\nRULE 3 - ITERATE\nYour first result is never your final result. Always follow up:\n- Make the opening line stronger\n- Shorten this to 45 seconds\n- Add more urgency to the CTA\n- Rewrite the hook as a shocking statistic"},
    {title:"Explaining Your Prompts To Others",body:"When someone asks how you built that with AI - say this:\n\nI use a structured prompting technique. I assign the AI a specific role, then give it a precise task with format requirements, length constraints, tone guidelines, and an example of what I am looking for. The more specific and structured the instruction, the more professional the output.\n\nYou can also say:\nI combine role-based prompting with iterative refinement. I generate a first draft, then give targeted feedback to improve specific elements - similar to how a director works with a creative team.\n\nJohn - when you say THAT to someone, they know you understand AI at a professional level. Because you DO."}
  ]},
  {id:"affiliate",emoji:"💰",title:"Affiliate Marketing Mastery",color:"#10b981",lessons:[
    {title:"What Affiliate Marketing Is",body:"PLAIN ENGLISH:\nYou earn a commission every time someone buys through YOUR special link.\n\n1. Sign up as Vidnoz affiliate (free)\n2. Get your unique link\n3. Share it in videos, descriptions, emails\n4. Someone clicks and buys Vidnoz\n5. Vidnoz pays YOU 50% of that sale\n\nYOUR INCOME MATH:\n- 10 Vidnoz sales at $50 each = $250/month\n- 20 Vidnoz sales = $500/month\n- 1 MailerLite referral = $140 by itself\n\nYou already have 5 programs set up. The only missing piece is traffic."},
    {title:"Influencer-Style Promo Formula",body:"An influencer promo feels like a genuine recommendation from someone you trust.\n\n1. HOOK - Pain point: I used to spend 6 hours editing one video...\n2. STORY - Experience: Then I found this AI tool...\n3. DEMO - What it does: Now I create a professional video in 10 minutes...\n4. PROOF - Result: My last video got 2,400 views in 48 hours...\n5. CTA - Action: Click the link in my description to try it free\n\nYour anchors Susan, Alisha, Lisa and Paul ARE your influencers."},
    {title:"Your 5 Programs Deep Dive",body:"VIDNOZ - 50% Commission - TOP EARNER\nBest angle: Create professional AI videos without a camera\nBest anchor: Alisha (sales energy) or Lisa (credibility)\n\nINVIDEO - 30% Commission\nBest angle: 15-second affiliate ad templates that convert\nBest anchor: Alisha or Paul\n\nMAILERLITE - $140 Per Referral\nBest angle: Build your email list and earn $140 per referral\nBest anchor: Susan (warm, trustworthy)\n\nCAPCUT - Varies\nBest audience: TikTok and Instagram creators\n\nUDEMY - 15% Per Course\nBest audience: people wanting to learn new skills"},
    {title:"Affiliate Content That Converts",body:"THE GOLDEN RULE: Lead with VALUE not the sale.\n\n1. TUTORIAL VIDEOS - Show the tool in action. Link in description.\n2. COMPARISON VIDEOS - Best AI video tools 2025. Your tools win.\n3. RESULTS VIDEOS - I made 5 videos in one day. Real results.\n4. NEWS MENTION - At end of every video: Created using Vidnoz AI - link below. Passive promotion. Works while you sleep.\n5. EMAIL SEQUENCES - Day 1: The problem. Day 2: The solution. Day 3: Special offer.\n\nAll of this can be written in Hub Engine V4 right now."}

  {id:"funnel",emoji:"🔻",title:"Funnel Building 101",color:"#06b6d4",lessons:[
    {title:"What Is A Funnel",body:"A FUNNEL is the path a stranger takes to become a paying customer.\n\nSTAGE 1 - AWARENESS: They do not know you exist. Get their attention with a video.\n\nSTAGE 2 - INTEREST: They watched your video and want more. Send them to a landing page or email opt-in.\n\nSTAGE 3 - DESIRE: They are on your email list. Show them WHY they need your product.\n\nSTAGE 4 - ACTION: They are ready to buy. Give them a clear CTA with your affiliate link.\n\nTHAT IS THE ENTIRE FUNNEL."},

// ── GROQ API CALL ─────────────────────────────────────────────
async function groqCall(sys,msg){
  const key=store.get("groqkey","");
  if(!key)return"Please add your Groq API key in Settings first. (starts with gsk_)";
  try{
    const r=await fetch("https://api.groq.com/openai/v1/chat/completions",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
      body:JSON.stringify({model:"llama-3.3-70b-versatile",messages:[{role:"system",content:sys},{role:"user",content:msg}],max_tokens:900,temperature:0.8})
    });
    const d=await r.json();
    if(d.error)return"Groq Error: "+d.error.message;
    return d.choices?.[0]?.message?.content||"No response.";
  }catch(e){return"Connection error. Check your Groq key in Settings.";}
}

// ── ELEVENLABS VOICE — using eleven_turbo_v2_5 for natural sound ──
async function speakEL(text,voiceKey){
  const key=store.get("elkey","");
  if(!key)return;
  const voiceId=VOICE_IDS[voiceKey]?.id||VOICE_IDS.becky.id;
  const clean=text.replace(/[^\w\s.,!?';\-]/g," ").trim().substring(0,500);
  if(!clean)return;
  try{
    const r=await fetch("https://api.elevenlabs.io/v1/text-to-speech/"+voiceId+"/stream",{
      method:"POST",
      headers:{"xi-api-key":key,"Content-Type":"application/json"},
      body:JSON.stringify({
        text:clean,
        model_id:EL_MODEL,
        voice_settings:{
          stability:0.45,
          similarity_boost:0.80,
          style:0.35,
          use_speaker_boost:true
        }
      })
    });
    if(!r.ok){console.log("EL Error:",r.status);return;}
    const blob=await r.blob();
    const audio=new Audio();
    audio.src=URL.createObjectURL(blob);
    audio.play();
  }catch(e){console.log("Voice error:",e);}
}

// ── CONTENT CALENDAR ──────────────────────────────────────────
function ContentCalendar({events,setEvents}){

  const blank={title:"",host:"Lisa",platform:"YouTube",type:"Video",date:today(),notes:"",emoji:"🎬",color:"#f0a500"};

  function openNew(date){setForm({...blank,date:date||today()});setEditEvt(null);setShowForm(true);}
  function openEdit(ev){setForm({...ev});setEditEvt(ev.id);setShowForm(true);}
  function save(){if(!form.title.trim())return;const et=EVENT_TYPES.find(x=>x.type===form.type)||EVENT_TYPES[0];const ev={...form,emoji:et.emoji,color:et.color};if(editEvt){setEvents(p=>p.map(e=>e.id===editEvt?{...ev,id:editEvt}:e));}else{setEvents(p=>[...p,{...ev,id:uid()}]);}setShowForm(false);}
  function del(id){if(confirm("Delete?"))setEvents(p=>p.filter(e=>e.id!==id));}

  const moName=cur.toLocaleString("default",{month:"long"});

  function getWeek(){const d=new Date(cur);d.setDate(d.getDate()-d.getDay());return Array.from({length:7},(_,i)=>{const x=new Date(d);x.setDate(d.getDate()+i);return x;});}
  const wk=getWeek();
  const upcoming=[...events].filter(e=>e.date>=today()).sort((a,b)=>a.date.localeCompare(b.date));
  const prev=()=>{const d=new Date(cur);mode==="month"?d.setMonth(d.getMonth()-1):d.setDate(d.getDate()-7);setCur(d);};
  const next=()=>{const d=new Date(cur);mode==="month"?d.setMonth(d.getMonth()+1):d.setDate(d.getDate()+7);setCur(d);};

        <div style={{display:"flex",gap:8}}>

      </div>
      {mode!=="list"&&<div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}><button onClick={prev} style={{...C.ghost,padding:"7px 14px"}}>prev</button><div style={{flex:1,textAlign:"center",fontFamily:"'Space Grotesk',sans-serif",fontSize:16,fontWeight:800,color:"#fff"}}>{mode==="month"?moName+" "+yr:"Week of "+wk[0].toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div><button onClick={()=>setCur(new Date())} style={{...C.ghost,padding:"7px 12px",fontSize:11}}>Today</button><button onClick={next} style={{...C.ghost,padding:"7px 14px"}}>next</button></div>}
      {mode==="month"&&(

          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",borderBottom:"1px solid #1a1f2e"}}>{["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=><div key={d} style={{padding:"9px 0",textAlign:"center",fontSize:10,fontWeight:700,color:"#5a6275",letterSpacing:1}}>{d}</div>)}</div>

// ── LEARNING CENTER ───────────────────────────────────────────
function LearnCenter(){
  const tracks=window.TRACKS||[];
  const [selTrack,setSelTrack]=useState(null),[selLesson,setSelLesson]=useState(null);
  const [progress,setProgress]=useState(()=>store.get("learn_progress",{}));
  function markDone(tId,idx){const key=tId+"_"+idx;const np={...progress,[key]:!progress[key]};setProgress(np);store.set("learn_progress",np);}
  function getProgress(tId,total){let done=0;for(let i=0;i<total;i++){if(progress[tId+"_"+i])done++;}return done;}
  if(selTrack&&selLesson!==null){
    const track=tracks.find(t=>t.id===selTrack);
    const lesson=track.lessons[selLesson];
    const done=progress[selTrack+"_"+selLesson];
    return(
      <div style={{animation:"slideIn .35s ease"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
          <button onClick={()=>setSelLesson(null)} style={{...C.ghost,padding:"7px 12px",fontSize:11}}>Back</button>
          <div style={{flex:1}}><div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:18,fontWeight:900,color:"#fff"}}>{lesson.title}</div><div style={{fontSize:11,color:track.color,marginTop:1}}>{track.emoji} {track.title}</div></div>
          <button onClick={()=>markDone(selTrack,selLesson)} style={{background:done?"rgba(16,185,129,.15)":"rgba(255,255,255,.05)",border:"1px solid "+(done?"#10b981":"#2a3040"),color:done?"#10b981":"#9aa0b0",borderRadius:9,padding:"7px 14px",cursor:"pointer",fontSize:11,fontWeight:700}}>{done?"✅ Done!":"Mark Complete"}</button>
        </div>
        <div style={{...C.card,border:"1px solid "+track.color+"33"}}><div style={{fontSize:13,color:"#d1d5e0",lineHeight:1.9,whiteSpace:"pre-wrap"}}>{lesson.body}</div></div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:14,gap:10}}>
          {selLesson>0?<button onClick={()=>setSelLesson(selLesson-1)} style={{...C.ghost,flex:1,justifyContent:"center"}}>Previous</button>:<div style={{flex:1}}/>}
          {selLesson<track.lessons.length-1?<button onClick={()=>setSelLesson(selLesson+1)} style={{...C.gold,flex:1,justifyContent:"center"}}>Next Lesson</button>:<button onClick={()=>setSelLesson(null)} style={{...C.gold,flex:1,justifyContent:"center"}}>Track Complete!</button>}
        </div>
      </div>
    );
  }
  if(selTrack){
    const track=tracks.find(t=>t.id===selTrack);
    const done=getProgress(selTrack,track.lessons.length);
    return(
      <div style={{animation:"slideIn .35s ease"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
          <button onClick={()=>setSelTrack(null)} style={{...C.ghost,padding:"7px 12px",fontSize:11}}>All Tracks</button>
          <div style={{flex:1}}><div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:20,fontWeight:900,color:"#fff"}}>{track.emoji} {track.title}</div><div style={{fontSize:11,color:"#8891a8",marginTop:1}}>{done}/{track.lessons.length} completed</div></div>
          <div style={{background:track.color+"18",border:"1px solid "+track.color+"33",borderRadius:9,padding:"5px 12px",fontSize:12,fontWeight:700,color:track.color}}>{Math.round(done/track.lessons.length*100)}%</div>
        </div>
        <div style={{height:4,background:"#1e2433",borderRadius:2,marginBottom:18,overflow:"hidden"}}><div style={{height:"100%",background:track.color,borderRadius:2,width:Math.round(done/track.lessons.length*100)+"%",transition:"width .4s"}}/></div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {track.lessons.map((lesson,i)=>{const isDone=progress[selTrack+"_"+i];return(
            <div key={i} onClick={()=>setSelLesson(i)} style={{...C.card,display:"flex",alignItems:"center",gap:13,cursor:"pointer",border:"1px solid "+(isDone?"#10b98133":"#1e2433"),borderLeft:"4px solid "+(isDone?"#10b981":track.color),transition:"all .2s"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,.055)"} onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,.035)"}>
              <div style={{width:32,height:32,borderRadius:9,background:isDone?"rgba(16,185,129,.15)":track.color+"16",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:14}}>{isDone?"✅":i+1}</div>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:isDone?"#10b981":"#e8eaf0"}}>{lesson.title}</div></div>
              <span style={{color:"#4a5166",fontSize:18}}>›</span>
            </div>
          );})}
        </div>
      </div>
    );
  }
  return(
    <div style={{animation:"slideIn .35s ease"}}>
      <div style={{marginBottom:18}}><div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:22,fontWeight:900,color:"#fff"}}>Learning Center</div><div style={{fontSize:12,color:"#8891a8",marginTop:2}}>8 tracks built specifically for you, John.</div></div>
      <div style={{...C.card,background:"linear-gradient(135deg,rgba(240,165,0,.08),rgba(0,180,255,.05))",border:"1px solid rgba(240,165,0,.2)",marginBottom:18}}>
        <div style={{fontSize:13,color:"#e8eaf0",lineHeight:1.8}}><strong style={{color:"#f0a500",fontSize:14}}>John — this is your personal AI university.</strong><br/>Every lesson is written specifically for you. Start with Track 1. Track 8 is your POWER UPGRADE — Claude Code + Remotion. You already have Node.js v22.17.0 installed — you are ahead of the game!</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {tracks.map(track=>{
          const done=getProgress(track.id,track.lessons.length);
          const pct=Math.round(done/track.lessons.length*100);
          const isNew=track.id==="claudecode";
          return(
            <div key={track.id} onClick={()=>setSelTrack(track.id)} style={{...C.card,cursor:"pointer",borderLeft:"4px solid "+track.color,transition:"all .2s",position:"relative"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,.055)"} onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,.035)"}>
              {isNew&&<div style={{position:"absolute",top:12,right:12,fontSize:9,fontWeight:700,background:"#06b6d4",color:"#000",borderRadius:5,padding:"2px 7px",letterSpacing:1}}>POWER UP</div>}
              <div style={{display:"flex",alignItems:"center",gap:11,marginBottom:10}}>
                <div style={{width:42,height:42,borderRadius:12,background:track.color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{track.emoji}</div>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:"#fff"}}>{track.title}</div><div style={{fontSize:10,color:"#6b7485",marginTop:2}}>{track.lessons.length} lessons</div></div>
                <div style={{fontSize:12,fontWeight:700,color:pct>0?track.color:"#4a5166"}}>{pct}%</div>
              </div>
              <div style={{height:3,background:"#1e2433",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",background:track.color,borderRadius:2,width:pct+"%",transition:"width .4s"}}/></div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── SETTINGS ──────────────────────────────────────────────────
function Settings(){
  const [gKey,setGKey]=useState(()=>store.get("groqkey",""));
  const [elKey,setElKey]=useState(()=>store.get("elkey",""));
  const [gSaved,setGSaved]=useState(false),[elSaved,setElSaved]=useState(false),[testing,setTesting]=useState(false),[selVoice,setSelVoice]=useState("becky");
  function saveGroq(){if(!gKey.trim())return;store.set("groqkey",gKey.trim());setGSaved(true);setTimeout(()=>setGSaved(false),2500);}
  function saveEL(){if(!elKey.trim())return;store.set("elkey",elKey.trim());setElSaved(true);setTimeout(()=>setElSaved(false),2500);}
  async function testVoice(){
    const key=store.get("elkey","");
    if(!key){alert("Save your ElevenLabs key first!");return;}
    setTesting(true);
    const texts={
      becky:"Hello John darling! Becky here, your British Creative Director. Ready to make something brilliant today!",
      susan:"Hi John, Susan here. Ready to deliver your story with warmth and clarity.",
      alisha:"Hey John, Alisha here. Let us make something amazing and get those affiliate sales rolling!",
      lisa:"Good evening John. Lisa here. Ready to deliver today's AI news with authority.",
      paul:"John. Paul here. Let us get to work. No nonsense. Just results."
    };
    await speakEL(texts[selVoice]||texts.becky,selVoice);
    setTimeout(()=>setTesting(false),4000);
  }
  const hasGroq=!!store.get("groqkey","");
  const hasEL=!!store.get("elkey","");
  return(
    <div style={{animation:"slideIn .35s ease"}}>
      <div style={{marginBottom:18}}><div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:22,fontWeight:900,color:"#fff"}}>Settings</div><div style={{fontSize:12,color:"#8891a8",marginTop:2}}>API keys, voice controls, and your profile.</div></div>

      <div style={{...C.card,border:"1px solid rgba(96,165,250,.3)",marginBottom:14}}>
        <div style={{fontWeight:700,color:"#fff",fontSize:15,marginBottom:4}}>⚡ Groq API Key — Powers All AI Tools</div>
        <div style={{fontSize:12,color:"#8891a8",marginBottom:14}}>Required for AI Tools, Claude Chat, and Becky Chat. Free at console.groq.com</div>
        <label style={C.lbl}>YOUR GROQ API KEY (starts with gsk_)</label>
        <input type="password" value={gKey} onChange={e=>setGKey(e.target.value)} placeholder="gsk_..." style={{...C.inp,border:"1px solid #1e2433",marginBottom:10}}/>
        <div style={{display:"flex",gap:9}}>
          <button onClick={saveGroq} style={{...C.gold,flex:1,justifyContent:"center"}}>{gSaved?"✅ Groq Key Saved!":"Save Groq Key"}</button>
          {hasGroq&&<button onClick={()=>{store.set("groqkey","");setGKey("");}} style={{...C.ghost,padding:"10px 14px"}}>Clear</button>}
        </div>
        {hasGroq&&<div style={{marginTop:10,fontSize:11,color:"#10b981",background:"rgba(16,185,129,.1)",border:"1px solid rgba(16,185,129,.25)",borderRadius:8,padding:"7px 12px"}}>✅ Groq key saved — AI Tools are active!</div>}
      </div>

      <div style={{...C.card,border:"1px solid rgba(240,165,0,.25)",marginBottom:14}}>
        <div style={{fontWeight:700,color:"#fff",fontSize:15,marginBottom:4}}>🎙️ ElevenLabs Key — Powers All 5 Voices</div>
        <div style={{fontSize:12,color:"#8891a8",marginBottom:4}}>Powers Becky, Susan, Alisha, Lisa and Paul voices.</div>
        <div style={{fontSize:11,color:"#f0a500",background:"rgba(240,165,0,.08)",border:"1px solid rgba(240,165,0,.2)",borderRadius:7,padding:"6px 10px",marginBottom:14}}>✨ Now using eleven_turbo_v2_5 — ElevenLabs most natural voice model. Much better than before!</div>
        <label style={C.lbl}>YOUR ELEVENLABS API KEY (starts with sk_)</label>
        <input type="password" value={elKey} onChange={e=>setElKey(e.target.value)} placeholder="sk_..." style={{...C.inp,border:"1px solid #1e2433",marginBottom:10}}/>
        <div style={{display:"flex",gap:9}}>
          <button onClick={saveEL} style={{...C.gold,flex:1,justifyContent:"center"}}>{elSaved?"✅ ElevenLabs Saved!":"Save ElevenLabs Key"}</button>
          {hasEL&&<button onClick={()=>{store.set("elkey","");setElKey("");}} style={{...C.ghost,padding:"10px 14px"}}>Clear</button>}
        </div>
        {hasEL&&<div style={{marginTop:10,fontSize:11,color:"#10b981",background:"rgba(16,185,129,.1)",border:"1px solid rgba(16,185,129,.25)",borderRadius:8,padding:"7px 12px"}}>✅ ElevenLabs key saved — voices are active!</div>}
      </div>

      <div style={{...C.card,marginBottom:14}}>
        <div style={{fontWeight:700,color:"#fff",fontSize:15,marginBottom:4}}>🎭 Voice Test Studio</div>
        <div style={{fontSize:12,color:"#8891a8",marginBottom:12}}>Select a voice and hit Test to hear them speak. Using eleven_turbo_v2_5 for maximum quality.</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:7,marginBottom:12}}>
          {Object.entries(VOICE_IDS).map(([k,v])=>(
            <div key={k} onClick={()=>setSelVoice(k)} style={{background:selVoice===k?"rgba(240,165,0,.12)":"rgba(255,255,255,.03)",border:"1px solid "+(selVoice===k?"#f0a500":"#1e2433"),borderRadius:9,padding:"9px 5px",textAlign:"center",cursor:"pointer",transition:"all .15s"}}>
              <div style={{fontSize:19,marginBottom:3}}>{k==="becky"?"🎨":k==="susan"?"👱‍♀️":k==="alisha"?"👩":k==="lisa"?"👧":"👴"}</div>
              <div style={{fontSize:10,fontWeight:700,color:selVoice===k?"#f0a500":"#8891a8"}}>{v.name}</div>
              <div style={{fontSize:9,color:"#4a5166",marginTop:1}}>{v.desc}</div>

        <button onClick={testVoice} disabled={testing} style={{...C.gold,width:"100%",justifyContent:"center",opacity:testing?0.6:1}}>{testing?"🔊 Playing — listen for natural voice quality...":"🔊 Test "+VOICE_IDS[selVoice]?.name+" Voice"}</button>
      </div>

      <div style={C.card}>
        <div style={{fontWeight:700,color:"#fff",fontSize:15,marginBottom:12}}>👤 John Lanter — CEO</div>
        <div style={{fontSize:12,color:"#9aa0b8",lineHeight:2}}>
          <div>📍 Location: Orange, Texas</div>
          <div>🏭 Background: 22+ years industrial ops, forklift certified, former 9-state sales rep</div>
          <div>⚡ Current: CEO of Hub Engine, Affiliate Marketing, AI Video Production</div>
          <div>💻 Node.js: v22.17.0 installed — ready for Claude Code + Remotion!</div>
          <div style={{marginTop:8,color:"#f0a500",fontWeight:700}}>Three Minds · One Mission · Zero Cost</div>
        </div>
      </div>
    </div>
  );
}

// ── ROOT APP ──────────────────────────────────────────────────
function App(){
  const [authed,setAuthed]=useState(false),[tab,setTab]=useState("dashboard");
  const [videos,setVidRaw]=useState(()=>store.get("videos",[]));
  const [scripts,setScrRaw]=useState(()=>store.get("scripts",[]));
  const [events,setEvtRaw]=useState(()=>store.get("events",[]));
  const setVideos=fn=>{setVidRaw(p=>{const n=typeof fn==="function"?fn(p):fn;store.set("videos",n);return n;});};
  const setScripts=fn=>{setScrRaw(p=>{const n=typeof fn==="function"?fn(p):fn;store.set("scripts",n);return n;});};
  const setEvents=fn=>{setEvtRaw(p=>{const n=typeof fn==="function"?fn(p):fn;store.set("events",n);return n;});};
  const nav=[
    {id:"dashboard",label:"Dashboard",icon:"📊"},
    {id:"tools",label:"AI Tools",icon:"⚡"},
    {id:"library",label:"Video Library",icon:"🎬",badge:()=>videos.length},
    {id:"archive",label:"Scripts",icon:"📄",badge:()=>scripts.length},
    {id:"calendar",label:"Calendar",icon:"📅",badge:()=>events.length},
    {id:"studio",label:"News Studio",icon:"📺"},
    {id:"affiliates",label:"Affiliates",icon:"💰"},
    {id:"jobs",label:"Jobs",icon:"💼"},
    {id:"claude",label:"Claude Chat",icon:"💬"},
    {id:"becky",label:"Becky Chat",icon:"🎨"},
    {id:"learn",label:"Learning",icon:"📚"},
    {id:"team",label:"Team HQ",icon:"👥"},
    {id:"settings",label:"Settings",icon:"⚙️"},
  ];
  if(!authed)return <Gate onAuth={()=>setAuthed(true)}/>;
  return(
    <div style={{minHeight:"100vh",background:"#06070d",display:"flex"}}>
      <aside style={{width:198,background:"#080b12",borderRight:"1px solid #141820",display:"flex",flexDirection:"column",position:"fixed",top:0,left:0,height:"100vh",zIndex:100}}>
        <div style={{padding:"16px 13px 13px",borderBottom:"1px solid #141820",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:32,height:32,borderRadius:9,background:"linear-gradient(135deg,#f0a500,#c06000)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,animation:"glow 3s infinite",flexShrink:0}}>⚡</div>
            <div><div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:12,fontWeight:900,color:"#fff",letterSpacing:-.4}}>HUB ENGINE</div><div style={{fontSize:7,color:"#f0a500",fontWeight:700,letterSpacing:3}}>V 4 . 0</div></div>
          </div>
        </div>
        <nav style={{flex:1,padding:"9px 6px",overflowY:"auto"}}>
          {nav.map(n=>{const on=tab===n.id,bc=n.badge?n.badge():0;return(
            <button key={n.id} onClick={()=>setTab(n.id)} style={{display:"flex",alignItems:"center",gap:7,width:"100%",padding:"7px 9px",borderRadius:7,marginBottom:1,border:"none",background:on?"rgba(240,165,0,.1)":"transparent",color:on?"#f0a500":"#8891a8",cursor:"pointer",fontSize:11,fontWeight:on?600:400,transition:"all .15s",textAlign:"left"}} onMouseEnter={e=>{if(!on){e.currentTarget.style.background="rgba(255,255,255,.04)";e.currentTarget.style.color="#c8d0e0";}}} onMouseLeave={e=>{if(!on){e.currentTarget.style.background="transparent";e.currentTarget.style.color="#8891a8";}}}>
              <span style={{fontSize:13}}>{n.icon}</span>
              <span style={{flex:1}}>{n.label}</span>
              {bc>0&&<span style={{fontSize:9,fontWeight:700,background:"rgba(240,165,0,.18)",color:"#f0a500",borderRadius:8,padding:"1px 5px"}}>{bc}</span>}
              {on&&<span style={{width:4,height:4,borderRadius:"50%",background:"#f0a500",flexShrink:0}}/>}
            </button>
          );})}
        </nav>
        <div style={{padding:"9px 6px",borderTop:"1px solid #141820",flexShrink:0}}>
          <div style={{fontSize:7,color:"#242c3a",textAlign:"center",lineHeight:1.7,marginBottom:6}}>Three Minds · One Mission<br/>Zero Cost · Orange, TX</div>
          <button onClick={()=>setAuthed(false)} style={{...C.ghost,width:"100%",justifyContent:"center",fontSize:10,padding:"6px",borderRadius:6}}>Lock Hub</button>
        </div>
      </aside>
      <main style={{marginLeft:198,flex:1,padding:"24px 28px",minHeight:"100vh"}}>
        <div style={{maxWidth:980}}>
          {tab==="dashboard"&&<Dashboard setTab={setTab} videos={videos} scripts={scripts} events={events}/>}
          {tab==="tools"&&<AITools onSave={s=>setScripts(p=>[...p,s])}/>}
          {tab==="library"&&<VideoLibrary videos={videos} setVideos={setVideos}/>}
          {tab==="archive"&&<ScriptArchive scripts={scripts} setScripts={setScripts}/>}
          {tab==="calendar"&&<ContentCalendar events={events} setEvents={setEvents}/>}
          {tab==="studio"&&<Studio/>}
          {tab==="affiliates"&&<Affiliates/>}
          {tab==="jobs"&&<Jobs/>}
          {tab==="claude"&&<ClaudeChat/>}
          {tab==="becky"&&<BeckyChat/>}
          {tab==="learn"&&<LearnCenter/>}
          {tab==="team"&&<Team/>}
          {tab==="settings"&&<Settings/>}
        </div>
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
