<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuideHub Digital Store</title>
    <style>
        body {
            background-color: #0c0f1a;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #1a1d23;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header nav a {
            margin-left: 20px;
            text-decoration: none;
            color: #00d4aa;
        }
        .header nav a:hover {
            text-decoration: underline;
        }
        .product {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
            padding: 20px;
            border: 1px solid #333;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        .product img {
            width: 100px;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .product h2 {
            font-size: 18px;
            margin-bottom: 10px;
        }
        .product p {
            font-size: 14px;
            margin-bottom: 10px;
        }
        .product button {
            background-color: #00d4aa;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }
        .product button:hover {
            background-color: #00b980;
        }
        .cart {
            position: fixed;
            top: 10px;
            right: 10px;
            background-color: #1a1d23;
            padding: 10px;
            border: 1px solid #333;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        .cart ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .cart li {
            margin-bottom: 10px;
        }
        .cart li span {
            font-size: 14px;
        }
        .cart li button {
            background-color: #00d4aa;
            color: #fff;
            border: none;
            padding: 5px 10px;
            border-radius: 10px;
            cursor: pointer;
        }
        .cart li button:hover {
            background-color: #00b980;
        }
        .upload {
            margin-top: 20px;
        }
        .upload input[type="file"] {
            display: none;
        }
        .upload label {
            background-color: #00d4aa;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }
        .upload label:hover {
            background-color: #00b980;
        }
        .footer {
            position: fixed;
            bottom: 10px;
            left: 10px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>GuideHub Digital Store</h1>
            <nav>
                <a href="#" id="home-link">Home</a>
                <a href="#" id="categories-link">Categories</a>
                <a href="#" id="cart-link">Cart (0)</a>
            </nav>
        </div>
        <div id="products" style="display: block;">
            <h2>Products</h2>
            <div class="product">
                <img src="https://via.placeholder.com/100x150" alt="Product 1">
                <h2>Product 1</h2>
                <p>Short description of product 1</p>
                <p>Price: $10.99</p>
                <button id="buy-now-1">Buy Now</button>
            </div>
            <div class="product">
                <img src="https://via.placeholder.com/100x150" alt="Product 2">
                <h2>Product 2</h2>
                <p>Short description of product 2</p>
                <p>Price: $9.99</p>
                <button id="buy-now-2">Buy Now</button>
            </div>
            <div class="product">
                <img src="https://via.placeholder.com/100x150" alt="Product 3">
                <h2>Product 3</h2>
                <p>Short description of product 3</p>
                <p>Price
