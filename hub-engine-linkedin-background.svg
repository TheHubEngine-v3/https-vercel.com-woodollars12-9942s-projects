<svg viewBox="0 0 1584 396" xmlns="http://www.w3.org/2000/svg" width="1584" height="396">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a0e1a"/>
      <stop offset="45%"  stop-color="#0d1520"/>
      <stop offset="100%" stop-color="#0a1a14"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#00b894"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f5c518"/>
      <stop offset="100%" stop-color="#e6b800"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="url(#bg)"/>

  <!-- Grid lines subtle -->
  <g opacity="0.04" stroke="#00d4aa" stroke-width="1">
    <line x1="0" y1="66" x2="1584" y2="66"/>
    <line x1="0" y1="132" x2="1584" y2="132"/>
    <line x1="0" y1="198" x2="1584" y2="198"/>
    <line x1="0" y1="264" x2="1584" y2="264"/>
    <line x1="0" y1="330" x2="1584" y2="330"/>
    <line x1="264" y1="0" x2="264" y2="396"/>
    <line x1="528" y1="0" x2="528" y2="396"/>
    <line x1="792" y1="0" x2="792" y2="396"/>
    <line x1="1056" y1="0" x2="1056" y2="396"/>
    <line x1="1320" y1="0" x2="1320" y2="396"/>
  </g>

  <!-- Left glow orb -->
  <circle cx="160" cy="200" r="220" fill="#00d4aa" opacity="0.04"/>
  <!-- Right glow orb -->
  <circle cx="1420" cy="180" r="200" fill="#a78bfa" opacity="0.05"/>

  <!-- Top teal accent line -->
  <rect x="0" y="0" width="1584" height="4" fill="url(#teal)"/>

  <!-- LEFT SECTION — Branding -->
  <!-- Hub Engine v4 title -->
  <text x="72" y="120" font-family="Georgia, serif" font-size="58" font-weight="900" fill="white" letter-spacing="-1">Hub Engine v4</text>
  <!-- Teal underline accent -->
  <rect x="72" y="132" width="320" height="3" fill="url(#teal)" rx="2"/>

  <!-- Subtitle -->
  <text x="72" y="175" font-family="Arial, sans-serif" font-size="22" fill="#00d4aa" font-weight="700" letter-spacing="2">AFFILIATEMEDIAHUB STUDIO</text>
  <text x="72" y="208" font-family="Arial, sans-serif" font-size="17" fill="rgba(255,255,255,0.65)" letter-spacing="1">AI-Powered Content Production Platform</text>
  <text x="72" y="238" font-family="Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.45)" letter-spacing="0.5">John Lanter · CEO &amp; Founder · Orange, Texas</text>

  <!-- Badges row -->
  <!-- Badge 1 -->
  <rect x="72" y="268" width="130" height="30" rx="15" fill="rgba(0,212,170,0.15)" stroke="#00d4aa" stroke-width="1"/>
  <text x="137" y="288" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#00d4aa" text-anchor="middle">$0/Month Stack</text>
  <!-- Badge 2 -->
  <rect x="212" y="268" width="140" height="30" rx="15" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="1"/>
  <text x="282" y="288" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#a78bfa" text-anchor="middle">AI Video Studio</text>
  <!-- Badge 3 -->
  <rect x="362" y="268" width="150" height="30" rx="15" fill="rgba(245,197,24,0.15)" stroke="#f5c518" stroke-width="1"/>
  <text x="437" y="288" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#f5c518" text-anchor="middle">Self-Hosted AI Tools</text>
  <!-- Badge 4 -->
  <rect x="522" y="268" width="130" height="30" rx="15" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="1"/>
  <text x="587" y="288" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#34d399" text-anchor="middle">Auto-Publishing</text>

  <!-- Tagline bottom left -->
  <text x="72" y="355" font-family="Georgia, serif" font-size="16" fill="rgba(255,255,255,0.35)" font-style="italic">Three Minds. One Mission. Zero Cost.</text>

  <!-- CENTER DIVIDER -->
  <line x1="720" y1="40" x2="720" y2="356" stroke="rgba(0,212,170,0.15)" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- RIGHT SECTION — Tech Stack Cards -->
  <!-- Stack title -->
  <text x="780" y="70" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.4)" letter-spacing="3">BUILT WITH</text>

  <!-- Tool cards — row 1 -->
  <!-- Groq -->
  <rect x="780" y="85" width="160" height="72" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(0,212,170,0.3)" stroke-width="1"/>
  <text x="800" y="116" font-family="Arial,sans-serif" font-size="26">⚡</text>
  <text x="834" y="112" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="white">Groq AI</text>
  <text x="834" y="132" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Becky's Brain · Free</text>
  <!-- ElevenLabs -->
  <rect x="954" y="85" width="160" height="72" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
  <text x="974" y="116" font-family="Arial,sans-serif" font-size="26">🎙</text>
  <text x="1008" y="112" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="white">ElevenLabs</text>
  <text x="1008" y="132" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">AI Voice · $5/mo</text>
  <!-- FreeStack -->
  <rect x="1128" y="85" width="180" height="72" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(245,197,24,0.3)" stroke-width="1"/>
  <text x="1148" y="116" font-family="Arial,sans-serif" font-size="26">🎬</text>
  <text x="1182" y="112" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="white">FreeStack Video</text>
  <text x="1182" y="132" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Own Render · $0</text>

  <!-- Tool cards — row 2 -->
  <!-- YouTube -->
  <rect x="780" y="172" width="160" height="72" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,77,109,0.3)" stroke-width="1"/>
  <text x="800" y="203" font-family="Arial,sans-serif" font-size="26">📺</text>
  <text x="834" y="199" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="white">YouTube</text>
  <text x="834" y="219" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Auto-Publish · Live</text>
  <!-- Vercel -->
  <rect x="954" y="172" width="160" height="72" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(0,212,170,0.3)" stroke-width="1"/>
  <text x="974" y="203" font-family="Arial,sans-serif" font-size="26">🚀</text>
  <text x="1008" y="199" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="white">Vercel</text>
  <text x="1008" y="219" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">App Hosting · Free</text>
  <!-- Render -->
  <rect x="1128" y="172" width="180" height="72" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
  <text x="1148" y="203" font-family="Arial,sans-serif" font-size="26">🖥</text>
  <text x="1182" y="199" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="white">Render.com</text>
  <text x="1182" y="219" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Backend · Free</text>

  <!-- Tool cards — row 3 -->
  <!-- Claude -->
  <rect x="780" y="259" width="160" height="72" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(245,197,24,0.3)" stroke-width="1"/>
  <text x="800" y="290" font-family="Arial,sans-serif" font-size="26">🤖</text>
  <text x="834" y="286" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="white">Claude AI</text>
  <text x="834" y="306" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Developer · Architect</text>
  <!-- GitHub -->
  <rect x="954" y="259" width="160" height="72" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(0,212,170,0.3)" stroke-width="1"/>
  <text x="974" y="290" font-family="Arial,sans-serif" font-size="26">📦</text>
  <text x="1008" y="286" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="white">GitHub</text>
  <text x="1008" y="306" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Source · Deploy · Free</text>
  <!-- Becky AI -->
  <rect x="1128" y="259" width="180" height="72" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,77,109,0.3)" stroke-width="1"/>
  <text x="1148" y="290" font-family="Arial,sans-serif" font-size="26">⭐</text>
  <text x="1182" y="286" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="white">Becky AI</text>
  <text x="1182" y="306" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Creative Director</text>

  <!-- Bottom accent line -->
  <rect x="0" y="392" width="1584" height="4" fill="url(#purple)" rx="0"/>
</svg>
