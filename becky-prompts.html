<title>Becky Prompt Library</title>

<style>
:root{--gold:#f5c518;--gold2:#e8a020;--dark:#07070f;--dark2:#0e0e1a;--dark3:#13131f;--border:rgba(245,197,24,0.18);--text:#eeeef5;--muted:rgba(238,238,245,0.45);--green:#0f9d58;--red:#ea4335;--blue:#4285f4;--purple:#7c3aed;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;background:var(--dark);color:var(--text);font-family:'Exo 2',sans-serif;}
body{padding:0 0 40px;}

/* HEADER */
.header{background:var(--dark2);border-bottom:2px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.header-icon{font-size:28px;}
.header-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--gold);letter-spacing:2px;}
.header-sub{font-size:10px;color:var(--muted);letter-spacing:1px;}
.count-badge{margin-left:auto;padding:4px 10px;background:rgba(245,197,24,0.12);border:1px solid rgba(245,197,24,0.3);border-radius:20px;font-size:11px;color:var(--gold);font-weight:700;white-space:nowrap;}

/* SEARCH */
.search-wrap{position:relative;}
.search-input{width:100%;padding:12px 44px 12px 14px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:15px;outline:none;}
.search-input:focus{border-color:var(--gold);}
.search-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none;}
.search-clear{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:18px;cursor:pointer;display:none;background:none;border:none;color:var(--muted);}

/* CATEGORIES */
.cats{display:flex;overflow-x:auto;gap:8px;padding:12px 16px;scrollbar-width:none;border-bottom:1px solid var(--border);}
.cats::-webkit-scrollbar{display:none;}
.cat-btn{flex-shrink:0;padding:7px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:20px;font-size:11px;color:var(--muted);cursor:pointer;transition:all .2s;font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:1px;white-space:nowrap;}
.cat-btn.active{background:rgba(245,197,24,0.12);border-color:var(--gold);color:var(--gold);}

/* RESULTS INFO */
.results-bar{padding:8px 16px;font-size:11px;color:var(--muted);border-bottom:1px solid rgba(255,255,255,0.05);}

/* PROMPT LIST */
.prompt-list{padding:12px 16px;}
.section-head{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;padding:14px 0 8px;}

.prompt-card{background:var(--dark3);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:14px;margin-bottom:9px;cursor:pointer;transition:all .2s;position:relative;}
.prompt-card:active{border-color:var(--gold);background:rgba(245,197,24,0.04);}
.prompt-card.copied{border-color:var(--green);}
.prompt-tag{display:inline-block;padding:2px 8px;border-radius:8px;font-size:9px;font-weight:700;margin-bottom:6px;letter-spacing:1px;}
.prompt-text{font-size:13px;color:var(--text);line-height:1.55;margin-bottom:8px;}
.prompt-footer{display:flex;align-items:center;justify-content:space-between;}
.prompt-hint{font-size:10px;color:var(--muted);}
.copy-btn{padding:5px 12px;background:rgba(245,197,24,0.1);border:1px solid rgba(245,197,24,0.25);border-radius:8px;font-size:10px;color:var(--gold);font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif;letter-spacing:1px;}
.copy-btn.done{background:rgba(15,157,88,0.15);border-color:rgba(15,157,88,0.35);color:var(--green);}

/* NO RESULTS */
.no-results{text-align:center;padding:48px 24px;color:var(--muted);font-size:14px;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(15,157,88,0.92);color:#fff;padding:8px 20px;border-radius:20px;font-size:12px;font-weight:700;z-index:9999;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;}
.toast.show{opacity:1;}

/* BACK BUTTON */
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--muted);text-decoration:none;margin-bottom:10px;}

/* COLOR TAGS */
.tag-jobs{background:rgba(66,133,244,0.15);color:#4285f4;}
.tag-ai{background:rgba(245,197,24,0.12);color:var(--gold);}
.tag-video{background:rgba(124,58,237,0.15);color:#a78bfa;}
.tag-affiliate{background:rgba(15,157,88,0.15);color:var(--green);}
.tag-learn{background:rgba(245,197,24,0.1);color:var(--gold2);}
.tag-social{background:rgba(234,67,53,0.12);color:#ea4335;}
.tag-biz{background:rgba(66,133,244,0.12);color:#60a5fa;}
.tag-writing{background:rgba(168,85,247,0.15);color:#c084fc;}
.tag-life{background:rgba(52,211,153,0.12);color:#34d399;}
.tag-tech{background:rgba(251,191,36,0.12);color:#fbbf24;}
</style>
</head>

// APP LOGIC
// ═══════════════════════════════════════════

let currentCat = 'all';
let currentSearch = '';

function renderPrompts() {
  const list = document.getElementById('promptList');
  const resultsBar = document.getElementById('resultsBar');
  const q = currentSearch.toLowerCase().trim();

  let filtered = PROMPTS.filter(p => {
    const catMatch = currentCat === 'all' || p.cat === currentCat;
    const searchMatch = !q || 
      p.text.toLowerCase().includes(q) || 
      p.hint.toLowerCase().includes(q) ||
      p.tag.toLowerCase().includes(q) ||
      p.cat.toLowerCase().includes(q);
    return catMatch && searchMatch;
  });

  document.getElementById('countBadge').textContent = PROMPTS.length + '+ PROMPTS';
  resultsBar.textContent = filtered.length === PROMPTS.length 
    ? `Showing all ${PROMPTS.length}+ prompts · Tap any to copy`
    : `${filtered.length} prompts found · Tap any to copy`;

  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-results">🔍 No prompts found for that search.<br/>Try different words or clear the search.</div>';
    return;
  }

  // Group by hint
  const groups = {};
  filtered.forEach(p => {
    const key = p.cat + '|' + p.hint;
    if (!groups[key]) groups[key] = { hint: p.hint, tag: p.tag, tagClass: p.tagClass, prompts: [] };
    groups[key].prompts.push(p);
  });

  let html = '';
  Object.values(groups).forEach(g => {
    if (q || currentCat !== 'all') {
      html += `<div class="section-head">${g.tag} — ${g.hint}</div>`;
    } else {
      html += `<div class="section-head">${g.hint}</div>`;
    }
    g.prompts.forEach((p, i) => {
      html += `
        <div class="prompt-card" id="pc_${p.text.substring(0,20).replace(/\W/g,'_')}_${i}">
          <span class="prompt-tag ${p.tagClass}">${p.tag}</span>
          <div class="prompt-text">${p.text}</div>
          <div class="prompt-footer">
            <span class="prompt-hint">📌 ${p.hint}</span>
            <button class="copy-btn" onclick="copyPrompt(this, \`${p.text.replace(/`/g,'\\`')}\`)">📋 COPY</button>
          </div>
        </div>`;
    });
  });

  list.innerHTML = html;
}

function copyPrompt(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✅ COPIED!';
    btn.classList.add('done');
    showToast('Prompt copied! Paste it in Becky or any AI tool.');
    setTimeout(() => {
      btn.textContent = '📋 COPY';
      btn.classList.remove('done');
    }, 2000);
  });
}

function filterCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderPrompts();
  window.scrollTo(0, 0);
}

function doSearch() {
  const val = document.getElementById('searchInput').value;
  currentSearch = val;
  document.getElementById('clearBtn').style.display = val ? 'block' : 'none';
  renderPrompts();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  currentSearch = '';
  document.getElementById('clearBtn').style.display = 'none';
  document.getElementById('searchInput').focus();
  renderPrompts();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Init
renderPrompts();
</script>
